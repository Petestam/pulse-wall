        background: #000;

        position: fixed;
        inset: 0;
        z-index: 0;
        display: block;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }
      #viz {
        position: absolute;
        inset: 0;
        display: block;
        width: 100%;
        height: 100%;
        background: transparent;
        touch-action: none;
        cursor: grab;
      }
      #viz.is-dragging {
        cursor: grabbing;
      }

    <script>
      (function () {
        "use strict";
        const canvas = document.getElementById("bg");
        const ctx = canvas.getContext("2d", { alpha: false });
        let cssW = 300;
        let cssH = 150;

        const BLOB_COUNT = 9;
        const T0 = performance.now();
        const MAX_GRID_CELLS = 12500;

        const bgWaveFreqInput = document.getElementById("bg-wave-freq");
        const bgWaveContrastInput = document.getElementById("bg-wave-contrast");
        const bgWaveFreqVal = document.getElementById("bg-wave-freq-val");
        const bgWaveContrastVal = document.getElementById("bg-wave-contrast-val");
        function syncBgValLabels() {
          if (bgWaveFreqVal && bgWaveFreqInput) {
            bgWaveFreqVal.textContent = String(bgWaveFreqInput.value);
          }
          if (bgWaveContrastVal && bgWaveContrastInput) {
            bgWaveContrastVal.textContent = String(bgWaveContrastInput.value);
          }
        }
        if (bgWaveFreqInput) bgWaveFreqInput.addEventListener("input", syncBgValLabels);
        if (bgWaveContrastInput) bgWaveContrastInput.addEventListener("input", syncBgValLabels);
        syncBgValLabels();

        function resize() {
          const dpr = Math.min(window.devicePixelRatio || 1, 2);
          cssW = window.innerWidth;
          cssH = window.innerHeight;
          canvas.width = Math.max(1, Math.floor(cssW * dpr));
          canvas.height = Math.max(1, Math.floor(cssH * dpr));
          canvas.style.width = cssW + "px";
          canvas.style.height = cssH + "px";
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        function drawBlob(cx, cy, r, stops) {
          const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
          for (let i = 0; i < stops.length; i++) {
            g.addColorStop(stops[i][0], stops[i][1]);
          }
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(cx, cy, r, 0, Math.PI * 2);
          ctx.fill();
        }

        function tick(now) {
          const fq = bgWaveFreqInput ? Number(bgWaveFreqInput.value) : 50;
          const ct = bgWaveContrastInput ? Number(bgWaveContrastInput.value) : 50;
          const freqScale = 0.35 + (Math.max(0, Math.min(100, fq)) / 100) * 2.15;
          const contrastMul = 0.35 + (Math.max(0, Math.min(100, ct)) / 100) * 1.65;
          const waveAmp = 0.52 + (ct / 100) * 0.78;
          const t = (now - T0) * 0.001 * freqScale;
          const w = cssW;
          const h = cssH;
          const m = Math.min(w, h);
          let gridStep = Math.max(7, Math.min(11, Math.floor(m / 85)));
          let cols = Math.ceil(w / gridStep) + 3;
          let rows = Math.ceil(h / gridStep) + 3;
          while (cols * rows > MAX_GRID_CELLS && gridStep < 22) {
            gridStep++;
            cols = Math.ceil(w / gridStep) + 3;
            rows = Math.ceil(h / gridStep) + 3;
          }

          if (window.GenerativeFieldBg) {
            window.GenerativeFieldBg.ensureInit(w, h);
            window.GenerativeFieldBg.drawBackground(ctx, w, h, t);
            window.GenerativeFieldBg.drawDotGrid(ctx, w, h, t);
            window.GenerativeFieldBg.drawVignette(ctx, w, h);
          } else {
            ctx.fillStyle = "rgb(7,24,45)";
            ctx.fillRect(0, 0, w, h);
          }

          const waveX = (px, py, tt) => {
            let x = 0;
            const ax = px * 0.026;
            const ay = py * 0.024;
            x += Math.sin(tt * 0.38 + ax * 1.1 + ay * 0.75) * 7;
            x += Math.cos(tt * 0.26 - ax * 1.35 + ay * 0.95) * 5.5;
            x += Math.sin(tt * 0.51 + (px + py) * 0.019) * 4.5;
            x += Math.sin(ax + tt * 0.31) * Math.sin(ay + tt * 0.27) * 14;
            x += Math.sin(px * 0.038 + tt * 0.35) * Math.sin(py * 0.036 - tt * 0.29) * 11;
            x += Math.sin((px * px + py * py) * 1.15e-5 + tt * 0.18) * 8;
            x += Math.cos(px * 0.021 + py * 0.019 + tt * 0.44) * 6;
            return x;
          };
          const waveY = (px, py, tt) => {
            let y = 0;
            const ax = px * 0.025;
            const ay = py * 0.027;
            y += Math.cos(tt * 0.36 + ay * 1.15 + ax * 0.7) * 6.5;
            y += Math.sin(tt * 0.29 + ay * 1.28 - ax * 0.88) * 5;
            y += Math.cos(tt * 0.48 + (px - py) * 0.017) * 4.5;
            y += Math.cos(ax + tt * 0.28) * Math.sin(ay + tt * 0.32) * 13;
            y += Math.cos(px * 0.037 - tt * 0.31) * Math.sin(py * 0.035 + tt * 0.26) * 10;
            y += Math.sin(px * py * 2.1e-5 + tt * 0.22) * 7;
            y += Math.sin(ax * 1.1 - ay * 0.9 + tt * 0.41) * 5.5;
            return y;
          };

          const offX = Math.sin(t * 0.14) * gridStep * 0.65 + Math.cos(t * 0.09) * gridStep * 0.25;
          const offY = Math.cos(t * 0.11) * gridStep * 0.6 + Math.sin(t * 0.085) * gridStep * 0.28;

          for (let j = -2; j < rows; j++) {
            for (let i = -2; i < cols; i++) {
              const px = i * gridStep + offX;
              const py = j * gridStep + offY;

          for (let j = 0; j < V_SEG; j++) {
            const v = j * dv;
            for (let i = 0; i < U_SEG - 1; i++) {
              const u0 = i * du;
              const u1 = (i + 1) * du;
              const p0 = toCanvas(project(solidShellPointNoSlide(u0, v), t));
              const p1 = toCanvas(project(solidShellPointNoSlide(u1, v), t));
              ctx.moveTo(p0.x, p0.y);
              ctx.lineTo(p1.x, p1.y);
            }
          }
          for (let i = 0; i < U_SEG; i++) {
            const u = i * du;
            for (let j = 0; j < V_SEG; j++) {
              const v0 = j * dv;
              const v1 = ((j + 1) % V_SEG) * dv;
              const p0 = toCanvas(project(solidShellPointNoSlide(u, v0), t));
              const p1 = toCanvas(project(solidShellPointNoSlide(u, v1), t));
              ctx.moveTo(p0.x, p0.y);
              ctx.lineTo(p1.x, p1.y);
            }
          }
          ctx.strokeStyle = "rgba(200, 220, 245, 0.2)";
          ctx.stroke();
        }

        function rebuildMarkers() {
          const total = U_SEG * V_SEG;
          const n = Math.min(Math.max(0, state.markerCount | 0), total);
          markerFlat.length = 0;
          if (n === 0) {
            state.selectedMarkerFlat = null;
            state.selectedChainIndex = null;
            return;
          }
          const order = [];
          for (let i = 0; i < total; i++) order.push(i);
          let rng = 2166136261;
          function nextRand() {
            rng = (Math.imul(rng, 48271) + 11) >>> 0;
            return rng / 4294967296;
          }
          for (let i = total - 1; i > 0; i--) {
            const j = Math.floor(nextRand() * (i + 1));
            const tmp = order[i];
            order[i] = order[j];
            order[j] = tmp;
          }
          for (let k = 0; k < n; k++) markerFlat.push(order[k]);
          if (
            state.selectedMarkerFlat != null &&
            markerFlat.indexOf(state.selectedMarkerFlat) < 0
          ) {
            state.selectedMarkerFlat = null;
            state.selectedChainIndex = null;
          }
        }

        function markerScreenPos(flat, toCanvas, t) {
          const du = Math.PI / Math.max(1, U_SEG - 1);
          const dv = (2 * Math.PI) / V_SEG;
          const j = flat % V_SEG;
          const i = Math.floor(flat / V_SEG);
          const u = i * du;
          const v = j * dv;
          return toCanvas(project(meshSurfacePoint(u, v, i, j), t));
        }

        function pairHash01(f0, f1, salt) {
          const h = ((f0 * 73856093) ^ (f1 * 19349663) ^ (salt * 83492791)) >>> 0;
          return h / 4294967296;
        }

        function strokeConnectionWideBezier(ax, ay, bx, by, curl01, idA, idB, seamS) {
          const dx = bx - ax;
          const dy = by - ay;
          const len = Math.hypot(dx, dy);
          if (len < 1.2) return;
          const ux = dx / len;
          const uy = dy / len;
          const px = -uy;
          const py = ux;
          const c = Math.max(0, Math.min(1, curl01));
          const h1 = pairHash01(idA, idB, seamS);
          const h2 = pairHash01(idA, idB, seamS + 23);
          const s1 = pairHash01(idA, idB, seamS + 41) < 0.5 ? -1 : 1;
          const s2 = pairHash01(idA, idB, seamS + 59) < 0.5 ? -1 : 1;
          const bulge = c * len * 0.38;
          const t1 = 0.26 + h1 * 0.12;
          const t2 = 0.62 + h2 * 0.12;
          const cp1x = ax + ux * len * t1 + px * s1 * bulge * (0.4 + 0.6 * h1);
          const cp1y = ay + uy * len * t1 + py * s1 * bulge * (0.4 + 0.6 * h1);
          const cp2x = ax + ux * len * t2 + px * s2 * bulge * (0.35 + 0.65 * h2);
          const cp2y = ay + uy * len * t2 + py * s2 * bulge * (0.35 + 0.65 * h2);
          ctx.beginPath();
          ctx.moveTo(ax, ay);
          ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, bx, by);
          ctx.stroke();
        }

        /**
         * Wide cubic Bézier with start tangent along unit (tx, ty); end uses chord toward target.
         * `strandJitter` scales extra lateral wobble so strands are not straight (0–1).
         */
        function strokeConnectionWideBezierTangentStart(
          ax,
          ay,
          bx,
          by,
          tx,
          ty,
          curl01,
          idA,
          idB,
          seamS,
          strandJitter,
        ) {
          const dx = bx - ax;
          const dy = by - ay;
          const len = Math.hypot(dx, dy);
          if (len < 1.2) return;
          const ux = dx / len;
          const uy = dy / len;
          const px = -ty;
          const py = tx;
          const qx = -uy;
          const qy = ux;
          const c = Math.max(0, Math.min(1, curl01));
          const h1 = pairHash01(idA, idB, seamS);
          const h2 = pairHash01(idA, idB, seamS + 23);
          const s1 = pairHash01(idA, idB, seamS + 41) < 0.5 ? -1 : 1;
          const s2 = pairHash01(idA, idB, seamS + 59) < 0.5 ? -1 : 1;
          const sj =
            strandJitter !== undefined && strandJitter !== null
              ? strandJitter
              : 0.48;
          const bulge = c * len * 0.38 * (1 + 0.62 * sj);
          const t1 = 0.24 + h1 * 0.14;
          const t2 = 0.58 + h2 * 0.14;
          const w1 = len * 0.085 * sj * (pairHash01(idA, idB, seamS + 211) - 0.5) * 2;
          const w2 = len * 0.055 * sj * (pairHash01(idA, idB, seamS + 223) - 0.5) * 2;
          const cp1x =
            ax +
            tx * len * t1 +
            px * s1 * bulge * (0.4 + 0.6 * h1) +
            px * w1;
          const cp1y =
            ay +
            ty * len * t1 +
            py * s1 * bulge * (0.4 + 0.6 * h1) +
            py * w1;
          const cp2x =
            ax +
            ux * len * t2 +
            qx * s2 * bulge * (0.35 + 0.65 * h2) +
            qx * w2 +
            px * w1 * 0.55;
          const cp2y =
            ay +
            uy * len * t2 +
            qy * s2 * bulge * (0.35 + 0.65 * h2) +
            qy * w2 +
            py * w1 * 0.55;
          ctx.beginPath();
          ctx.moveTo(ax, ay);
          ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, bx, by);
          ctx.stroke();
        }

        /** One 90° corner in screen space (Manhattan leg). */
        function strokePanelStrandOrthogonal(A, B) {
          const dx = B.x - A.x;
          const dy = B.y - A.y;
          if (Math.abs(dx) + Math.abs(dy) < 2) return;
          const corner =
            Math.abs(dx) >= Math.abs(dy)
              ? { x: B.x, y: A.y }
              : { x: A.x, y: B.y };
          ctx.beginPath();
          ctx.moveTo(A.x, A.y);
          ctx.lineTo(corner.x, corner.y);
          ctx.lineTo(B.x, B.y);
          ctx.stroke();
        }

        /**
         * Manhattan path through a vertical spine at viewport center — parallel “bundle” mid-screen,
         * horizontal in/out (stadium / long-range transit diagram sensibility).
         */
        function strokePanelStrandOrthogonalViaSpine(A, B, spineX, eps) {
          const ex = eps !== undefined && eps !== null ? eps : 0.75;
          if (Math.abs(B.x - A.x) + Math.abs(B.y - A.y) < 2) return;
          if (Math.abs(A.y - B.y) < ex) {
            ctx.beginPath();
            ctx.moveTo(A.x, A.y);
            ctx.lineTo(B.x, B.y);
            ctx.stroke();
            return;
          }
          ctx.beginPath();
          ctx.moveTo(A.x, A.y);
          if (Math.abs(A.x - spineX) > ex) {
            ctx.lineTo(spineX, A.y);
          }
          if (Math.abs(A.y - B.y) > ex) {
            ctx.lineTo(spineX, B.y);
          }
          if (Math.abs(B.x - spineX) > ex) {
            ctx.lineTo(B.x, B.y);
          }
          ctx.stroke();
        }

        /** Blend orthogonal vs spine routing; `cd01` is 0…1 from “Transit spine (screen)” slider. */
        function strokePanelStrandStadiumTransit(A, B, cw, ch, cd01, idA, idB, salt) {
          const a = Math.max(0, Math.min(1, cd01));
          if (a < 0.06) {
            strokePanelStrandOrthogonal(A, B);
            return;
          }
          const spineX =
            cw * 0.5 +
            (pairHash01(idA, idB, salt + 5) - 0.5) * 14 * a;
          strokePanelStrandOrthogonalViaSpine(A, B, spineX, 0.75);
        }

        function panelLinkAllowedSameSeam(ciA, mA, ciB, mB, skip) {
          if (ciA !== ciB) return true;
          return Math.abs(mA - mB) > skip;
        }

        /**
         * One marker-to-marker segment with correction fillet in middle-third chord span:
         * corner target K is placed along A→B at t in [1/3, 2/3], then offset normal.
         */
        function drawMarkerMidFilletSegment(A, B, idA, idB, salt) {
          const dx = B.x - A.x;
          const dy = B.y - A.y;
          const len = Math.hypot(dx, dy);
          if (len < 1e-6) return;
          const ux = dx / len;
          const uy = dy / len;
          const nx = -uy;
          const ny = ux;
          const t = 1 / 3 + pairHash01(idA, idB, salt + 17) * (1 / 3);
          const sign = pairHash01(idA, idB, salt + 29) < 0.5 ? -1 : 1;
          const bend = sign * MARKER_MID_BEND_FRAC * len;
          const K = {
            x: A.x + ux * (t * len) + nx * bend,
            y: A.y + uy * (t * len) + ny * bend,
          };
          const r = Math.max(
            0.85,
            Math.min(MARKER_FILLET_R_MAX, MARKER_FILLET_FRAC * len),
          ) * state.pathFilletMul;
          if (r <= 0) {
            ctx.beginPath();
            ctx.moveTo(A.x, A.y);
            ctx.lineTo(B.x, B.y);
            ctx.stroke();
            return;
          }
          ctx.beginPath();
          ctx.moveTo(A.x, A.y);
          ctx.arcTo(K.x, K.y, B.x, B.y, r);
          ctx.lineTo(B.x, B.y);
          ctx.stroke();
        }

        /** A→B→C→D with per-segment middle-third fillets (AB, BC, CD). */
        function strokeMarkerChainElbows(A, B, C, D, f1, f2, f3, f4) {
          drawMarkerMidFilletSegment(A, B, f1, f2, 1);
          drawMarkerMidFilletSegment(B, C, f2, f3, 2);
          drawMarkerMidFilletSegment(C, D, f3, f4, 3);
        }

        function flatToWorld3(flat, t) {
          const du = Math.PI / Math.max(1, U_SEG - 1);
          const dv = (2 * Math.PI) / V_SEG;
          const j = flat % V_SEG;
          const i = Math.floor(flat / V_SEG);
          const u = i * du;
          const v = j * dv;
          return meshSurfacePoint(u, v, i, j);
        }

        function distWorld3(a, b) {
          return Math.hypot(a.x - b.x, a.y - b.y, a.z - b.z);
        }

        /**
         * Greedy chains of four markers along surface proximity (nearest-neighbor from a seed),
         * so paths tend to wrap the ellipsoid instead of jumping across quarters of the list.
         */
        function buildMarkerChainsProximity(t) {
          const n = markerFlat.length;
          let q = Math.floor(n / 8);
          if (q < 1 && n >= 4) q = 1;
          if (q < 1) return [];
          const world = [];
          for (let k = 0; k < n; k++) world.push(flatToWorld3(markerFlat[k], t));
          const unused = new Set();
          for (let k = 0; k < n; k++) unused.add(k);
          const chains = [];
          for (let c = 0; c < q; c++) {
            let minK = null;
            let minFlat = Infinity;
            for (const k of unused) {
              if (markerFlat[k] < minFlat) {
                minFlat = markerFlat[k];
                minK = k;
              }
            }
            if (minK === null) break;
            const m1 = minK;
            unused.delete(m1);
            function nearestIdx(fromK) {
              const p = world[fromK];
              let bestK = null;
              let bestD = Infinity;
              for (const k of unused) {
                const d = distWorld3(p, world[k]);
                if (d < bestD) {
                  bestD = d;
                  bestK = k;
                }
              }
              return bestK;
            }
            const k2 = nearestIdx(m1);
            if (k2 === null) break;
            unused.delete(k2);
            const k3 = nearestIdx(k2);
            if (k3 === null) break;
            unused.delete(k3);
            const k4 = nearestIdx(k3);
            if (k4 === null) break;
            unused.delete(k4);
            chains.push([markerFlat[m1], markerFlat[k2], markerFlat[k3], markerFlat[k4]]);
          }
          return chains;
        }

        function findChainIndexForFlat(flat, chains) {
          if (!chains) return null;
          for (let i = 0; i < chains.length; i++) {
            if (chains[i].indexOf(flat) >= 0) return i;
          }
          return null;
        }

        function pickMarkerAtCanvas(clientX, clientY, toCanvas, t) {
          const rect = canvas.getBoundingClientRect();
          const px = clientX - rect.left;
          const py = clientY - rect.top;
          const hitR = 4.5 + 3.2 * state.markerSizeMul;
          for (let k = 0; k < markerFlat.length; k++) {
            const flat = markerFlat[k];
            const c = markerScreenPos(flat, toCanvas, t);
            if (Math.hypot(c.x - px, c.y - py) <= hitR) return flat;
          }
          return null;
        }

        function drawMarkerConnections(toCanvas, t, chains) {
          if (!chains || chains.length === 0) return;
          const hi = state.selectedChainIndex;
          ctx.save();
          ctx.lineJoin = "round";
          ctx.lineCap = "round";
          ctx.setLineDash([]);

          function strokeChain(flats, highlight) {
            const f1 = flats[0];
            const f2 = flats[1];
            const f3 = flats[2];
            const f4 = flats[3];
            const p1 = markerScreenPos(f1, toCanvas, t);
            const p2 = markerScreenPos(f2, toCanvas, t);
            const p3 = markerScreenPos(f3, toCanvas, t);
            const p4 = markerScreenPos(f4, toCanvas, t);
            ctx.lineWidth = highlight ? 2.1 : 0.72;
            ctx.strokeStyle = highlight
              ? "rgba(255, 255, 255, 0.92)"
              : "rgba(210, 225, 245, 0.28)";
            strokeMarkerChainElbows(p1, p2, p3, p4, f1, f2, f3, f4);
          }

          for (let i = 0; i < chains.length; i++) {
            if (i !== hi) strokeChain(chains[i], false);
          }
          if (hi != null && hi >= 0 && hi < chains.length) {
            strokeChain(chains[hi], true);
          }

          ctx.restore();
        }

        /**
         * Trust zone — rigid lattice vs routed “stadium” paths.
         * Standardized vocabulary: TRUST_FILLETS_PX (4 radii), TRUST_KNEE (90° orth stubs).
         * Routed links use an outer ellipse loop; the long arc avoids cutting through the infield.
         */
        const TRUST_GRID_STEP_FRAC = 0.036;
        const TRUST_FILLETS_PX = [4, 8, 14, 22];
        const TWO_PI_TRUST = Math.PI * 2;

        function trustFilletPick(idA, idB, salt) {
          const k =
            (Math.imul(idA | 0, 73856093) ^
              Math.imul(idB | 0, 19349663) ^
              Math.imul(salt | 0, 83492791)) >>>
            0;
          return TRUST_FILLETS_PX[k % TRUST_FILLETS_PX.length];
        }

        function trustShortestAngleDelta(th0, th1) {
          let d = th1 - th0;
          while (d > Math.PI) d -= TWO_PI_TRUST;
          while (d <= -Math.PI) d += TWO_PI_TRUST;
          return d;
        }

        /** Long-way sweep around ellipse (running the bend, not the infield chord). */
        function trustLongEllipseDelta(th0, th1) {
          const dShort = trustShortestAngleDelta(th0, th1);
          if (Math.abs(dShort) < 1e-10) return TWO_PI_TRUST;
          return dShort > 0 ? dShort - TWO_PI_TRUST : TWO_PI_TRUST + dShort;
        }

        function trustEllipsePoint(ell, th) {
          return {
            x: ell.cx + ell.rx * Math.cos(th),
            y: ell.cy + ell.ry * Math.sin(th),
          };
        }

        function trustNearestTheta(px, py, ell) {
          return Math.atan2((py - ell.cy) / ell.ry, (px - ell.cx) / ell.rx);
        }

        function trustClampFillet(r, segLen) {
          const m = Math.max(2.5, segLen * 0.42);
          return Math.min(r, m);
        }

        /**
         * S → 90° orth stub (one arcTo, radius from TRUST_FILLETS_PX) → long ellipse lap →
         * 90° stub → H. Only those fillet sizes; only right-angle knees on stubs.
         * `laneExpandPx` offsets the loop (outer lanes).
         */
        function strokeStadiumRouted(
          sx,
          sy,
          hx,
          hy,
          ellBase,
          idA,
          idB,
          salt,
          laneExpandPx,
        ) {
          const ell = {
            cx: ellBase.cx,
            cy: ellBase.cy,
            rx: ellBase.rx + laneExpandPx,
            ry: ellBase.ry + laneExpandPx,
          };
          const dx0 = hx - sx;
          const dy0 = hy - sy;
          const len0 = Math.hypot(dx0, dy0);
          if (len0 < 2) return;
          const nx = -dy0 / len0;
          const ny = dx0 / len0;
          sx += nx * laneExpandPx * 0.28;
          sy += ny * laneExpandPx * 0.28;
          hx += nx * laneExpandPx * 0.28;
          hy += ny * laneExpandPx * 0.28;

          const thS = trustNearestTheta(sx, sy, ell);
          const thH = trustNearestTheta(hx, hy, ell);
          const E0 = trustEllipsePoint(ell, thS);
          const E1 = trustEllipsePoint(ell, thH);
          const longD = trustLongEllipseDelta(thS, thH);
          const arcSeg = Math.max(
            32,
            Math.min(
              100,
              Math.ceil((Math.abs(longD) / TWO_PI_TRUST) * 80),
            ),
          );
          const legIn = Math.hypot(E0.x - sx, E0.y - sy);
          const legOut = Math.hypot(E1.x - hx, E1.y - hy);
          const rKneeIn = trustClampFillet(trustFilletPick(idA, idB, salt), legIn);
          const rKneeOut = trustClampFillet(
            TRUST_FILLETS_PX[(salt + 9) % TRUST_FILLETS_PX.length],
            legOut,
          );

          const horizFirst = Math.abs(E0.x - sx) >= Math.abs(E0.y - sy);
          const horizFirstOut = Math.abs(hx - E1.x) >= Math.abs(hy - E1.y);

          ctx.beginPath();
          ctx.moveTo(sx, sy);
          if (horizFirst) {
            ctx.arcTo(E0.x, sy, E0.x, E0.y, rKneeIn);
          } else {
            ctx.arcTo(sx, E0.y, E0.x, E0.y, rKneeIn);
          }
          ctx.lineTo(E0.x, E0.y);
          for (let k = 1; k <= arcSeg; k++) {
            const th = thS + longD * (k / arcSeg);
            const p = trustEllipsePoint(ell, th);
            ctx.lineTo(p.x, p.y);
          }
          if (horizFirstOut) {
            ctx.arcTo(E1.x, hy, hx, hy, rKneeOut);
          } else {
            ctx.arcTo(hx, E1.y, hx, hy, rKneeOut);
          }
          ctx.lineTo(hx, hy);
          ctx.stroke();
        }

        function trustTrackEllipseBase(coreC, chassisW, chassisH) {
          const pad = Math.max(14, Math.min(chassisW, chassisH) * 0.14);
          return {
            cx: coreC.x,
            cy: coreC.y,
            rx: chassisW * 0.58 + pad,
            ry: chassisH * 0.68 + pad,
          };
        }

        function trustCoreHubs3D() {
          const step = Math.min(AX, BY, CZ) * TRUST_GRID_STEP_FRAC;
          const out = [];
          for (let gx = -1; gx <= 1; gx++) {
            for (let gy = -1; gy <= 1; gy++) {
              for (let gz = -1; gz <= 0; gz++) {
                out.push({ x: gx * step, y: gy * step, z: gz * step });
              }
            }
          }
          return out;
        }

        function trustGridManhattan3(a, b) {
          const step = Math.min(AX, BY, CZ) * TRUST_GRID_STEP_FRAC;
          const q = step > 1e-9 ? 1 / step : 1;
          const gxa = Math.round(a.x * q);
          const gya = Math.round(a.y * q);
          const gza = Math.round(a.z * q);
          const gxb = Math.round(b.x * q);
          const gyb = Math.round(b.y * q);
          const gzb = Math.round(b.z * q);
          return (
            Math.abs(gxa - gxb) +
            Math.abs(gya - gyb) +
            Math.abs(gza - gzb)
          );
        }

        /**
         * Abstract hyperscale “facility” read: translucent shell (no flat black box),
         * tiered horizontal bands (compute / fabric / persistence), radial data core,
         * slate hub blades + white/slate east–west switching fabric, stadium uplinks
         * in moonlight neutrals. Linework in this block is intentionally sparse (thinned grid,
         * single core ring, no dashed fabric overlay, fewer edge/uplink strokes).
         */
        function drawTrustZoneCore(toCanvas, t) {
          if (!state.showPaths || STATIC_POINT_UV.length < 2) return;
          const hubs3 = trustCoreHubs3D();
          const hubScr = hubs3.map((p) => toCanvas(project(p, t)));
          const coreC = toCanvas(project({ x: 0, y: 0, z: 0 }, t));
          const nStatic = STATIC_POINT_UV.length;
          const staticScr = [];
          for (let i = 0; i < nStatic; i++) {
            staticScr.push(toCanvas(project(staticAnchorPoint3(i), t)));
          }

          ctx.save();
          ctx.lineJoin = "round";
          ctx.lineCap = "round";

          const maxDim = Math.max(
            canvas.clientWidth || 400,
            canvas.clientHeight || 400,
          );
          const chassisW = Math.min(maxDim * 0.1, 128);
          const chassisH = Math.min(maxDim * 0.068, 88);
          const ellBase = trustTrackEllipseBase(coreC, chassisW, chassisH);
          const rx = 4;
          const cx0 = coreC.x - chassisW * 0.5;
          const cy0 = coreC.y - chassisH * 0.5;

          /* Facility shell — glass slate, not opaque black */
          const shellGrad = ctx.createLinearGradient(cx0, cy0, cx0 + chassisW, cy0 + chassisH);
          shellGrad.addColorStop(0, "rgba(28, 42, 72, 0.38)");
          shellGrad.addColorStop(0.5, "rgba(18, 30, 52, 0.32)");
          shellGrad.addColorStop(1, "rgba(22, 36, 58, 0.4)");
          ctx.fillStyle = shellGrad;
          ctx.beginPath();
          if (typeof ctx.roundRect === "function") {
            ctx.roundRect(cx0, cy0, chassisW, chassisH, rx);
          } else {
            ctx.rect(cx0, cy0, chassisW, chassisH);
          }
          ctx.fill();
          ctx.strokeStyle = "rgba(255, 255, 255, 0.16)";
          ctx.lineWidth = 1;
          ctx.stroke();

          /* Tier bands — fewer divisions (~40% less grid ink than 4×5) */
          ctx.strokeStyle = "rgba(255, 255, 255, 0.07)";
          ctx.lineWidth = 0.55;
          ctx.lineJoin = "miter";
          ctx.lineCap = "butt";
          const nBars = 3;
          const nCols = 3;
          for (let b = 1; b < nBars; b++) {
            const yy = cy0 + (chassisH * b) / nBars;
            ctx.beginPath();
            ctx.moveTo(cx0 + 5, yy);
            ctx.lineTo(cx0 + chassisW - 5, yy);
            ctx.stroke();
          }
          for (let c = 1; c < nCols; c++) {
            const xx = cx0 + (chassisW * c) / nCols;
            ctx.beginPath();
            ctx.moveTo(xx, cy0 + 5);
            ctx.lineTo(xx, cy0 + chassisH - 5);
            ctx.stroke();
          }
          ctx.lineJoin = "round";
          ctx.lineCap = "round";

          /* Data core — radial plane (storage / consolidated plane), no gold box */
          const vaultR = Math.min(11, chassisW * 0.1);
          const rg = ctx.createRadialGradient(
            coreC.x,
            coreC.y,
            0,
            coreC.x,
            coreC.y,
            vaultR * 3.2,
          );
          rg.addColorStop(0, "rgba(230, 238, 255, 0.1)");
          rg.addColorStop(0.4, "rgba(120, 155, 210, 0.05)");
          rg.addColorStop(1, "rgba(255, 255, 255, 0)");
          ctx.fillStyle = rg;
          ctx.beginPath();
          ctx.arc(coreC.x, coreC.y, vaultR * 3.2, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = "rgba(255, 255, 255, 0.28)";
          ctx.lineWidth = 0.85;
          ctx.beginPath();
          ctx.arc(coreC.x, coreC.y, vaultR * 1.15, 0, Math.PI * 2);
          ctx.stroke();

          /* Nucleus: particle sphere (datastores) with faint bezier links into smart switch origin. */
          const nDataStores = 34;
          const nucleusR = vaultR * 2.25;
          const nowS = performance.now() * 0.001;

          const shell = ctx.createRadialGradient(
            coreC.x,
            coreC.y,
            vaultR * 0.2,
            coreC.x,
            coreC.y,
            nucleusR * 1.05,
          );
          shell.addColorStop(0, "rgba(220, 232, 255, 0.08)");
          shell.addColorStop(0.7, "rgba(168, 194, 232, 0.035)");
          shell.addColorStop(1, "rgba(255, 255, 255, 0)");
          ctx.fillStyle = shell;
          ctx.beginPath();
          ctx.arc(coreC.x, coreC.y, nucleusR * 1.05, 0, Math.PI * 2);
          ctx.fill();

          for (let pi = 0; pi < nDataStores; pi++) {
            const a = pairHash01(pi, 31, 7001) * Math.PI * 2;
            const r01 = Math.sqrt(pairHash01(pi, 47, 7013));
            const rp = nucleusR * (0.24 + 0.74 * r01);
            const px = coreC.x + Math.cos(a) * rp;
            const py = coreC.y + Math.sin(a) * rp;

            const bendSign = pairHash01(pi, 59, 7029) > 0.5 ? 1 : -1;
            const bend = (0.18 + 0.28 * pairHash01(pi, 61, 7031)) * rp * bendSign;
            const mx = (coreC.x + px) * 0.5;
            const my = (coreC.y + py) * 0.5;
            const nx = (py - coreC.y) / (rp || 1);
            const ny = -(px - coreC.x) / (rp || 1);
            const c1x = mx + nx * bend;
            const c1y = my + ny * bend;

            const twinkle =
              0.72 +
              0.28 *
                Math.sin(
                  nowS * 1.05 + pi * 0.47 + pairHash01(pi, 73, 7049) * Math.PI * 2,
                );
            ctx.strokeStyle = `rgba(220, 232, 255, ${0.06 + 0.08 * twinkle})`;
            ctx.lineWidth = 0.32 + 0.12 * pairHash01(pi, 79, 7063);
            ctx.beginPath();
            ctx.moveTo(px, py);
            ctx.bezierCurveTo(c1x, c1y, c1x, c1y, coreC.x, coreC.y);
            ctx.stroke();
          }

          for (let pi = 0; pi < nDataStores; pi++) {
            const a = pairHash01(pi, 83, 7091) * Math.PI * 2;
            const r01 = Math.sqrt(pairHash01(pi, 89, 7103));
            const rp = nucleusR * (0.24 + 0.74 * r01);
            const px = coreC.x + Math.cos(a) * rp;
            const py = coreC.y + Math.sin(a) * rp;
            const pr = 0.42 + 0.95 * pairHash01(pi, 97, 7129);
            ctx.fillStyle = `rgba(230, 240, 255, ${0.34 + 0.42 * pairHash01(pi, 101, 7151)})`;
            ctx.beginPath();
            ctx.arc(px, py, pr, 0, Math.PI * 2);
            ctx.fill();
          }

          /* Smart switch origin */
          ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
          ctx.beginPath();
          ctx.arc(coreC.x, coreC.y, 1.7, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = "rgba(230, 240, 255, 0.36)";
          ctx.lineWidth = 0.65;
          ctx.beginPath();
          ctx.arc(coreC.x, coreC.y, 3.6, 0, Math.PI * 2);
          ctx.stroke();

          const nh = hubScr.length;
          const centerIdx = hubs3.findIndex(
            (p) => p.x === 0 && p.y === 0 && p.z === 0,
          );
          const vaultIdx = centerIdx >= 0 ? centerIdx : 0;

          /* Hub blades — slate tiles, hairline white (switch / rack face) */
          for (let hi = 0; hi < nh; hi++) {
            const H = hubScr[hi];
            const isVault = hi === vaultIdx;
            const bw = isVault ? 0 : 3.2;
            const bh = isVault ? 0 : 2.4;
            if (!isVault) {
              ctx.fillStyle = "rgba(22, 36, 58, 0.92)";
              ctx.fillRect(H.x - bw * 0.5, H.y - bh * 0.5, bw, bh);
              ctx.strokeStyle = "rgba(255, 255, 255, 0.32)";
              ctx.lineWidth = 0.72;
              ctx.strokeRect(H.x - bw * 0.5, H.y - bh * 0.5, bw, bh);
            }
          }

          /* East–west fabric — neighbor links only */
          ctx.lineJoin = "miter";
          ctx.lineCap = "butt";
          for (let i = 0; i < nh; i++) {
            for (let j = i + 1; j < nh; j++) {
              if (trustGridManhattan3(hubs3[i], hubs3[j]) !== 1) continue;
              const p = pairHash01(i, j, 701);
              const ax = hubScr[i].x;
              const ay = hubScr[i].y;
              const bx = hubScr[j].x;
              const by = hubScr[j].y;
              ctx.strokeStyle = `rgba(200, 218, 240, ${0.18 + p * 0.2})`;
              ctx.lineWidth = 0.75 + p * 0.28;
              ctx.setLineDash([]);
              ctx.beginPath();
              ctx.moveTo(ax, ay);
              ctx.lineTo(bx, by);
              ctx.stroke();
            }
          }
          ctx.lineJoin = "round";
          ctx.lineCap = "round";

          /* Edge ring ↔ core — curated trunk set (avoid dense all-pairs mesh / cloverleaf read) */
          const trunkPairs = [
            [0, 4],
            [1, 6],
            [2, 7],
            [3, 8],
            [5, 9],
          ];
          for (let k = 0; k < trunkPairs.length; k++) {
            const i = trunkPairs[k][0];
            const j = trunkPairs[k][1];
            if (i >= nStatic || j >= nStatic || i === j) continue;
            const w = pairHash01(i, j, 1205);
            ctx.strokeStyle = `rgba(185, 205, 235, ${0.12 + w * 0.14})`;
            ctx.lineWidth = 0.54 + w * 0.24;
            ctx.setLineDash([]);
            strokeStadiumRouted(
              staticScr[i].x,
              staticScr[i].y,
              staticScr[j].x,
              staticScr[j].y,
              ellBase,
              i + 3000,
              j + 3000,
              1400 + i * 41 + j,
              (pairHash01(i, j, 1208) - 0.5) * 2.2,
            );
          }

          /* Uplinks: dual lanes only (no ghost trace; sparser picks) */
          const lane = 2.4;
          for (let si = 0; si < nStatic; si++) {
            const S = staticScr[si];
            for (let hi = 0; hi < nh; hi++) {
              const pick =
                pairHash01(si + 11, hi + 3, 902) > 0.55 ||
                (si + hi) % 5 === 0;
              if (!pick) continue;
              const H = hubScr[hi];
              const w = pairHash01(si, hi, 910);
              ctx.strokeStyle = `rgba(220, 232, 255, ${0.22 + w * 0.2})`;
              ctx.lineWidth = 0.85 + w * 0.38;
              ctx.setLineDash([]);
              strokeStadiumRouted(
                S.x,
                S.y,
                H.x,
                H.y,
                ellBase,
                si + 2000,
                hi + 5000,
                1200 + si * 17 + hi,
                -lane,
              );
              strokeStadiumRouted(
                S.x,
                S.y,
                H.x,
                H.y,
                ellBase,
                si + 2050,
                hi + 5050,
                1250 + si * 19 + hi,
                lane,
              );
            }
          }

          ctx.restore();
        }

        function drawFixedPaths(toCanvas, t) {
          if (!state.showPaths || STATIC_POINT_UV.length < 2) return;
          const pts = [];
          for (let i = 0; i < STATIC_POINT_UV.length; i++) {
            pts.push(toCanvas(project(staticAnchorPoint3(i), t)));
          }
          const n = pts.length;
          const keyPairs = [
            [0, 4],
            [1, 6],
            [2, 7],
            [3, 8],
            [5, 9],
          ];
          const rot = (state.pathExtendMul * Math.PI) / 180;
          const cr = Math.cos(rot);
          const sr = Math.sin(rot);

          ctx.save();
          ctx.lineJoin = "round";
          ctx.lineCap = "round";
          ctx.setLineDash([]);

          for (let k = 0; k < keyPairs.length; k++) {
            const aIdx = keyPairs[k][0];
            const bIdx = keyPairs[k][1];
            if (aIdx >= n || bIdx >= n || aIdx === bIdx) continue;
            const A = pts[aIdx];
            const B = pts[bIdx];
            const dx = B.x - A.x;
            const dy = B.y - A.y;
            const len = Math.hypot(dx, dy) || 1;
            const ux = dx / len;
            const uy = dy / len;
            const nx = -uy;
            const ny = ux;
            const bend01 = pairHash01(aIdx, bIdx, 341);
            const bendSign = pairHash01(aIdx, bIdx, 349) > 0.5 ? 1 : -1;
            const bendMag =
              (0.08 + bend01 * 0.16) * len * Math.max(0.35, state.pathFilletMul);
            const mx = (A.x + B.x) * 0.5;
            const my = (A.y + B.y) * 0.5;
            const tx = nx * cr - ny * sr;
            const ty = nx * sr + ny * cr;
            const C = {
              x: mx + tx * bendMag * bendSign,
              y: my + ty * bendMag * bendSign,
            };
            const w = pairHash01(aIdx, bIdx, 355);

            ctx.beginPath();
            ctx.moveTo(A.x, A.y);
            if (state.pathThroughPoints) {
              ctx.quadraticCurveTo(C.x, C.y, B.x, B.y);
            } else {
              const h = len * (0.12 + 0.14 * state.pathHandleMul);
              const cp1 = { x: A.x + ux * h + tx * bendMag * 0.5, y: A.y + uy * h + ty * bendMag * 0.5 };
              const cp2 = { x: B.x - ux * h + tx * bendMag * 0.5, y: B.y - uy * h + ty * bendMag * 0.5 };
              ctx.bezierCurveTo(cp1.x, cp1.y, cp2.x, cp2.y, B.x, B.y);
            }
            ctx.strokeStyle = `rgba(255,255,255,${0.58 + 0.2 * w})`;
            ctx.lineWidth = 0.95 + 0.55 * w;
            ctx.stroke();
          }
          ctx.restore();
        }

        function drawStaticVolumePoints(toCanvas, t) {
          if (!state.showStaticVolumePoints) return;
          ctx.save();
          ctx.lineJoin = "round";
          ctx.lineCap = "round";
          for (let i = 0; i < STATIC_POINT_UV.length; i++) {
            const c = toCanvas(project(staticAnchorPoint3(i), t));
            ctx.beginPath();
            ctx.arc(c.x, c.y, 3.4, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(255, 232, 200, 0.88)";
            ctx.fill();
            ctx.strokeStyle = "rgba(255, 255, 255, 0.42)";
            ctx.lineWidth = 1.05;
            ctx.stroke();
          }
          ctx.restore();
        }

        function drawVertexMarkers(toCanvas, t) {
          const n = markerFlat.length;
          if (n === 0) return;
          const sel = state.selectedMarkerFlat;
          const rBase = 2.1 * state.markerSizeMul;
          const rSel = 2.65 * state.markerSizeMul;
          const rRing = 5.2 * state.markerSizeMul;
          for (let k = 0; k < n; k++) {
            const flat = markerFlat[k];
            const c = markerScreenPos(flat, toCanvas, t);
            const isSel = sel !== null && flat === sel;
            if (isSel) {
              ctx.beginPath();
              ctx.arc(c.x, c.y, rRing, 0, Math.PI * 2);
              ctx.strokeStyle = "rgba(220, 235, 255, 0.65)";
              ctx.lineWidth = Math.max(1.2, 1.6 * state.markerSizeMul * 0.7);
              ctx.stroke();
            }
            ctx.beginPath();
            ctx.arc(c.x, c.y, isSel ? rSel : rBase, 0, Math.PI * 2);
            ctx.fillStyle = isSel ? "rgba(255, 255, 255, 1)" : "rgba(255, 255, 255, 0.95)";
            ctx.fill();
          }
        }

        /** Integer-aligned grid: 12 × 5 × 5 cells in [-HALF, +HALF] per axis. */
        function drawVolumeGrid(toCanvas, t) {
          const xCoords = [];
          for (let i = 0; i <= TILE_X; i++) xCoords.push(-HALF_X + i);
          const yCoords = [];
          for (let j = 0; j <= TILE_Y; j++) yCoords.push(-HALF_Y + j);
          const zCoords = [];
          for (let k = 0; k <= TILE_Z; k++) zCoords.push(-HALF_Z + k);

          ctx.beginPath();

          for (let yi = 0; yi < yCoords.length; yi++) {
            for (let zi = 0; zi < zCoords.length; zi++) {
              const y = yCoords[yi];
              const z = zCoords[zi];
              const p0 = toCanvas(project({ x: -HALF_X, y, z }, t));
              const p1 = toCanvas(project({ x: HALF_X, y, z }, t));
              ctx.moveTo(p0.x, p0.y);
              ctx.lineTo(p1.x, p1.y);
            }
          }

          for (let xi = 0; xi < xCoords.length; xi++) {
            for (let zi = 0; zi < zCoords.length; zi++) {
              const x = xCoords[xi];
              const z = zCoords[zi];
              const p0 = toCanvas(project({ x, y: -HALF_Y, z }, t));
              const p1 = toCanvas(project({ x, y: HALF_Y, z }, t));
              ctx.moveTo(p0.x, p0.y);
              ctx.lineTo(p1.x, p1.y);
            }
          }

          for (let xi = 0; xi < xCoords.length; xi++) {
            for (let yi = 0; yi < yCoords.length; yi++) {
              const x = xCoords[xi];
              const y = yCoords[yi];
              const p0 = toCanvas(project({ x, y, z: -HALF_Z }, t));
              const p1 = toCanvas(project({ x, y, z: HALF_Z }, t));
              ctx.moveTo(p0.x, p0.y);
              ctx.lineTo(p1.x, p1.y);
            }
          }

          ctx.stroke();
        }

        /** Smooth panel point inset from mesh shell — follows slide when active. */
        function panelSurfacePoint(u, v) {
          const p = ellipsoidSurfacePoint(u, v);
          const s = 1 - PANEL_INSET_FRAC;
          return { x: p.x * s, y: p.y * s, z: p.z * s };
        }

        /**
         * Volleyball / soccer-inspired seams: curved meridional strips + parabolic latitude-like bands.
         * All curves live on (u,v) then map onto the ellipsoid.
         */
        /** 0 = viewport center, ~1 toward edges — stroke weight bias for panel links. */
        function screenCenterBias01Panel(px, py, cw, ch) {
          const cx = cw * 0.5;
          const cy = ch * 0.5;
          const scale = Math.max(cw, ch) * 0.52;
          const nx = (px - cx) / scale;
          const ny = (py - cy) / scale;
          return Math.min(1, Math.hypot(nx, ny));
        }

        function drawBallPanels(toCanvas, tr, cw, ch) {
          const STEPS = 56;
          const PI = Math.PI;
          const TAU = 2 * PI;
          const nSeam = panelSeamCountFromTightness();
          const ns = Math.max(1, nSeam);
          const jitter = Math.max(0, Math.min(1, state.panelWrapJitter / 100));
          const uniformBias = state.panelUniformWrap ? 0.34 : 1;
          const jm = jitter * uniformBias;
          const panelCurves = [];

          function strokeCurve(getUV) {
            let first = true;
            for (let s = 0; s <= STEPS; s++) {
              const t = s / STEPS;
              const uv = getUV(t);
              const c = toCanvas(project(panelSurfacePoint(uv.u, uv.v), tr));
              if (first) {
                ctx.moveTo(c.x, c.y);
                first = false;
              } else {
                ctx.lineTo(c.x, c.y);
              }
            }
          }

          function markPanelCurve(getUV) {
            const divs = panelDotDivisionsFromDensity();
            if (divs <= 1) return;
            const cd = 0;
            const r0 = Math.max(0.42, 1.28 - divs / 700);
            for (let m = 1; m < divs; m++) {
              const tt = m / divs;
              const uv = getUV(tt);
              const c = toCanvas(project(panelSurfacePoint(uv.u, uv.v), tr));
              const nd = screenCenterBias01Panel(c.x, c.y, cw, ch);
              const r = r0 * (1 + cd * (1 - nd) * 0.95);
              const alpha = 0.78 + cd * (1 - nd) * 0.18;
              ctx.beginPath();
              ctx.arc(c.x, c.y, r, 0, Math.PI * 2);
              ctx.fillStyle = "rgba(255, 255, 255, " + alpha + ")";
              ctx.fill();
            }
          }

          /* Longitudinal seams (volleyball-style strips), parabolic / wavy in v */
          for (let k = 0; k < nSeam; k++) {
            const vBase = k * (TAU / nSeam);
            const ha = hashPanel(k, 41);
            const hb = hashPanel(k, 43);
            const hd = hashPanel(k, 53);
            panelCurves.push(function (t) {
              const u = PI * (2 * t - t * t);
              const par =
                (hd - 0.5) * 0.55 * jm * (t - 0.5) * (t - 0.5) * 4;
              const v =
                vBase +
                0.34 * Math.sin(PI * t) +
                (ha - 0.5) * 0.4 * jm * Math.sin(3 * PI * t) +
                (hb - 0.5) * 0.24 * jm * Math.sin(5 * PI * t) +
                par;
              return { u: u, v: wrapV(v) };
            });
          }

          /* Transverse bands: u(v) with parabolic + harmonic variation (soccer-like arcs) */
          for (let k = 0; k < nSeam; k++) {
            const uMid =
              (PI / (nSeam + 1)) * (k + 1) + (hashPanel(k, 61) - 0.5) * 0.09 * jm;
            const ha = hashPanel(k, 67);
            const hb = hashPanel(k, 71);
            const hp = hashPanel(k, 73);
            panelCurves.push(function (t) {
              const v = TAU * t;
              const vm = (v - PI) / PI;
              const u =
                uMid +
                (ha - 0.5) * 0.4 * jm * Math.sin(2 * v) +
                (hb - 0.5) * 0.2 * jm * Math.cos(3 * v) +
                (hp - 0.5) * 0.38 * jm * vm * vm;
              return {
                u: Math.max(U_EPS, Math.min(PI - U_EPS, u)),
                v: wrapV(v),
              };
            });
          }

          /* Diagonal “panel” cuts: quadratic blend in (u,v) for varied parabolic legs */
          for (let k = 0; k < nSeam; k++) {
            const g = hashPanel(k, 79);
            const h0 = hashPanel(k, 83);
            const h1 = hashPanel(k, 89);
            const u0 = 0.12 * PI + (k / ns) * 0.35 * PI;
            const u2 = PI - 0.1 * PI - (k / (ns + 2)) * 0.25 * PI;
            const v0 = k * (TAU / nSeam) + (g - 0.5) * 0.8 * jm;
            const v2 = wrapV(v0 + TAU / 3 + (h0 - 0.5) * 0.5 * jm);
            const u1 = (u0 + u2) * 0.5 + (h1 - 0.5) * 0.45 * PI * jm;
            const v1 = wrapV((v0 + v2) * 0.5 + (hashPanel(k, 97) - 0.5) * 0.9 * jm);
            panelCurves.push(function (t) {
              const omt = 1 - t;
              const u = omt * omt * u0 + 2 * omt * t * u1 + t * t * u2;
              let vv = omt * omt * v0 + 2 * omt * t * v1 + t * t * v2;
              vv = wrapV(vv);
              return {
                u: Math.max(U_EPS, Math.min(PI - U_EPS, u)),
                v: vv,
              };
            });
          }

          if (state.showPanelSeams) {
            const dashPct = Math.max(0, Math.min(100, state.panelLineDash | 0));
            ctx.beginPath();
            ctx.lineWidth = 1.08;
            ctx.lineJoin = "round";
            ctx.lineCap = "round";
            ctx.strokeStyle = "rgba(240, 248, 255, 0.38)";
            if (dashPct <= 0) {
              ctx.setLineDash([]);
            } else {
              const d = 0.75 + (dashPct / 100) * 9.25;
              ctx.setLineDash([d, d * 1.06]);
            }
            for (let i = 0; i < panelCurves.length; i++) {
              strokeCurve(panelCurves[i]);
            }
            ctx.stroke();
            ctx.setLineDash([]);
          }

          if (state.showPanelDots) {
            const divsRay = panelDotDivisionsFromDensity();
            if (divsRay > 1) {
              const seamS = state.panelSeamSeed | 0;
              const curl = 0.48;
              const skip = Math.max(0, Math.min(12, state.panelLinkSkip | 0));
              const cdTransit = 0;
              const nodes = [];
              for (let ci = 0; ci < panelCurves.length; ci++) {
                const getUV = panelCurves[ci];
                for (let m = 1; m < divsRay; m++) {
                  const tt = m / divsRay;
                  const uv = getUV(tt);
                  const P3 = panelSurfacePoint(uv.u, uv.v);
                  const E3 = {
                    x: P3.x * 0.9,
                    y: P3.y * 0.9,
                    z: P3.z * 0.9,
                  };
                  const s = toCanvas(project(P3, tr));
                  const e = toCanvas(project(E3, tr));
                  nodes.push({
                    id: ci * 1000000 + m,
                    ci: ci,
                    m: m,
                    sx: s.x,
                    sy: s.y,
                    ex: e.x,
                    ey: e.y,
                    wx: E3.x,
                    wy: E3.y,
                    wz: E3.z,
                    isMarker: false,
                  });
                }
              }
              const panelNodeCount = nodes.length;

              function linkXY(n) {
                return { x: n.ex, y: n.ey };
              }

              const staticAnchors = [];
              for (let sk = 0; sk < STATIC_POINT_UV.length; sk++) {
                const p3 = staticAnchorPoint3(sk);
                staticAnchors.push({
                  x: p3.x,
                  y: p3.y,
                  z: p3.z,
                  s: toCanvas(project(p3, tr)),
                });
              }

              ctx.save();
              ctx.lineCap = "round";
              ctx.lineJoin = "round";
              ctx.setLineDash([]);
              ctx.strokeStyle = "rgba(160, 210, 255, 0.42)";
              ctx.lineWidth = 0.5;
              for (let i = 0; i < panelNodeCount; i++) {
                const n = nodes[i];
                ctx.beginPath();
                ctx.moveTo(n.sx, n.sy);
                ctx.lineTo(n.ex, n.ey);
                ctx.stroke();
              }

              for (let i = 0; i < panelNodeCount; i++) {
                const na = nodes[i];
                const pA = linkXY(na);
                let sk = 0;
                let bestSd = Infinity;
                for (let k = 0; k < staticAnchors.length; k++) {
                  const dx = na.wx - staticAnchors[k].x;
                  const dy = na.wy - staticAnchors[k].y;
                  const dz = na.wz - staticAnchors[k].z;
                  const d = dx * dx + dy * dy + dz * dz;
                  if (d < bestSd) {
                    bestSd = d;
                    sk = k;
                  }
                }
                const S = staticAnchors[sk].s;
                let bestJ = -1;
                let bestD = Infinity;
                for (let j = 0; j < panelNodeCount; j++) {
                  if (j === i) continue;
                  const nb = nodes[j];
                  if (
                    !panelLinkAllowedSameSeam(na.ci, na.m, nb.ci, nb.m, skip)
                  ) {
                    continue;
                  }
                  const dx = na.wx - nb.wx;
                  const dy = na.wy - nb.wy;
                  const dz = na.wz - nb.wz;
                  const d = dx * dx + dy * dy + dz * dz;
                  if (d < bestD) {
                    // keep nearest neighbor in object space to avoid screen-space flips while orbiting
                    bestD = d;
                    bestJ = j;
                  }
                }

                const nd1 = screenCenterBias01Panel(
                  (pA.x + S.x) * 0.5,
                  (pA.y + S.y) * 0.5,
                  cw,
                  ch,
                );
                const baseA1 =
                  0.2 + (0.18 + cdTransit * 0.12) * (1 - nd1);
                ctx.strokeStyle = "rgba(210, 240, 255, " + baseA1 + ")";
                ctx.lineWidth =
                  0.32 + (0.2 + cdTransit * 0.12) * (1 - nd1);
                const rex = na.ex - na.sx;
                const rey = na.ey - na.sy;
                const rayLen = Math.hypot(rex, rey);
                let vrx = 1;
                let vry = 0;
                if (rayLen > 1e-6) {
                  vrx = rex / rayLen;
                  vry = rey / rayLen;
                }
                const chordAS = Math.hypot(pA.x - S.x, pA.y - S.y);
                const stub1 = Math.min(
                  0.14 * chordAS,
                  0.28 * rayLen,
                  40,
                );
                const j1x = pA.x + vrx * stub1;
                const j1y = pA.y + vry * stub1;
                if (stub1 > 1.2) {
                  ctx.beginPath();
                  ctx.moveTo(pA.x, pA.y);
                  ctx.lineTo(j1x, j1y);
                  ctx.stroke();
                }
                if (cdTransit > 0.12) {
                  strokePanelStrandStadiumTransit(
                    { x: j1x, y: j1y },
                    { x: S.x, y: S.y },
                    cw,
                    ch,
                    cdTransit,
                    na.id,
                    sk + 910000,
                    seamS + 101 * na.id,
                  );
                } else {
                  strokeConnectionWideBezierTangentStart(
                    j1x,
                    j1y,
                    S.x,
                    S.y,
                    vrx,
                    vry,
                    curl * 0.85,
                    na.id,
                    sk + 910000,
                    seamS,
                    0.22,
                  );
                }

                if (bestJ < 0 || bestD < 1e-8) continue;
                const b = nodes[bestJ];
                if (na.id >= b.id) continue;
                const pB = linkXY(b);
                const nd2 = screenCenterBias01Panel(
                  (S.x + pB.x) * 0.5,
                  (S.y + pB.y) * 0.5,
                  cw,
                  ch,
                );
                const baseA2 =
                  0.2 + (0.18 + cdTransit * 0.12) * (1 - nd2);
                ctx.strokeStyle = "rgba(210, 240, 255, " + baseA2 + ")";
                ctx.lineWidth =
                  0.32 + (0.2 + cdTransit * 0.12) * (1 - nd2);
                const sdx = pB.x - S.x;
                const sdy = pB.y - S.y;
                const sdl = Math.hypot(sdx, sdy);
                let vtx = 1;
                let vty = 0;
                if (sdl > 1e-6) {
                  vtx = sdx / sdl;
                  vty = sdy / sdl;
                }
                const chordSB = sdl;
                const stub2 = Math.min(0.1 * chordSB, 36);
                const j2x = S.x + vtx * stub2;
                const j2y = S.y + vty * stub2;
                if (stub2 > 1.2) {
                  ctx.beginPath();
                  ctx.moveTo(S.x, S.y);
                  ctx.lineTo(j2x, j2y);
                  ctx.stroke();
                }
                if (cdTransit > 0.12) {
                  strokePanelStrandStadiumTransit(
                    { x: j2x, y: j2y },
                    { x: pB.x, y: pB.y },
                    cw,
                    ch,
                    cdTransit,
                    sk + 920000,
                    b.id,
                    seamS + 3 + 97 * b.id,
                  );
                } else {
                  strokeConnectionWideBezierTangentStart(
                    j2x,
                    j2y,
                    pB.x,
                    pB.y,
                    vtx,
                    vty,
                    curl * 0.85,
                    sk + 920000,
                    b.id,
                    seamS + 3,
                    0.2,
                  );
                }
              }
              ctx.restore();
            }
            for (let i = 0; i < panelCurves.length; i++) {
              markPanelCurve(panelCurves[i]);
            }
          }

          ctx.lineWidth = 1;
        }

        /**
         * Central nucleus (Andromeda-only): volumetric 3D dot grid.
         * Grid extends beyond static-anchor extents, then culls dots inside
         * an offset sphere around each static anchor.
         */
        function drawDataStoreNucleus(toCanvas, tr, cw, ch) {
          const nStatic = STATIC_POINT_UV.length;
          if (nStatic < 2) return;

          const modelKey = [
            state.showVolume ? "volume" : "ellipsoid",
            state.nucleusGridSpacing.toFixed(4),
            state.nucleusGridSpacingMode,
            String(state.nucleusGridQty | 0),
            state.nucleusOriginTightness.toFixed(4),
            state.nucleusGridJitter.toFixed(4),
            state.nucleusCullOffset.toFixed(4),
          ].join("|");
          if (!state.nucleusModel || state.nucleusModelKey !== modelKey) {
            const staticPts = [];
            let maxAbsX = 0;
            let maxAbsY = 0;
            let maxAbsZ = 0;
            for (let i = 0; i < nStatic; i++) {
              const p = staticAnchorPoint3(i);
              staticPts.push(p);
              maxAbsX = Math.max(maxAbsX, Math.abs(p.x));
              maxAbsY = Math.max(maxAbsY, Math.abs(p.y));
              maxAbsZ = Math.max(maxAbsZ, Math.abs(p.z));
            }
            const spacing = Math.max(0.005, state.nucleusGridSpacing);
            const cullR = Math.max(0.05, state.nucleusCullOffset);
            const tight01 = Math.max(0, Math.min(1, state.nucleusOriginTightness));
            const jitter01 = Math.max(0, Math.min(1, state.nucleusGridJitter));
            const gamma = 1 + tight01 * 2.4; // 1=uniform, up to 3.4=center-dense
            const pad = spacing; // one grid spacing inside static extents
            const ex = Math.max(spacing * 2, maxAbsX - pad);
            const ey = Math.max(spacing * 2, maxAbsY - pad);
            const ez = Math.max(spacing * 2, maxAbsZ - pad);
            const culledDots = [];
            const isTri = state.nucleusGridSpacingMode === "triangular";
            const triYStep = spacing * (Math.sqrt(3) / 2);
            const maxAxisSamples = 140;
            const nx = Math.min(maxAxisSamples, Math.max(2, Math.round((ex * 2) / spacing)));
            const ny = Math.min(
              maxAxisSamples,
              Math.max(2, Math.round((ey * 2) / (isTri ? triYStep : spacing))),
            );
            const nz = Math.min(maxAxisSamples, Math.max(2, Math.round((ez * 2) / spacing)));
            function warpAxis(t, extent) {
              var a = Math.abs(t);
              var w = Math.pow(a, gamma);
              return (t < 0 ? -1 : 1) * w * extent;
            }
            for (let ix = 0; ix <= nx; ix++) {
              const tx = (ix / nx) * 2 - 1;
              const x = warpAxis(tx, ex);
              for (let iy = 0; iy <= ny; iy++) {
                const ty = (iy / ny) * 2 - 1;
                const y = warpAxis(ty, ey);
                for (let iz = 0; iz <= nz; iz++) {
                  const tz = (iz / nz) * 2 - 1;
                  const z = warpAxis(tz, ez);
                  const triOffset = isTri && ((iy + iz) & 1) ? spacing * 0.5 : 0;
                  const h0 = pairHash01(ix * 92821 + iy * 68917 + iz * 28387, 17, 4411);
                  const h1 = pairHash01(ix * 31337 + iy * 27179 + iz * 9973, 19, 4423);
                  const h2 = pairHash01(ix * 12347 + iy * 8191 + iz * 421, 23, 4441);
                  const jAmp = spacing * jitter01;
                  const jx = (h0 * 2 - 1) * jAmp;
                  const jy = (h1 * 2 - 1) * jAmp;
                  const jz = (h2 * 2 - 1) * jAmp;
                  const xTri = x + triOffset + jx;
                  const yTri = y + jy;
                  const zTri = z + jz;
                  let culled = false;
                  for (let si = 0; si < staticPts.length; si++) {
                    const sp = staticPts[si];
                    const dx = xTri - sp.x;
                    const dy = yTri - sp.y;
                    const dz = zTri - sp.z;
                    if (dx * dx + dy * dy + dz * dz <= cullR * cullR) {
                      culled = true;
                      break;
                    }
                  }
                  if (culled) continue;
                  culledDots.push({ x: xTri, y: yTri, z: zTri, row: iy });
                }
              }
            }

            let dots3 = culledDots;
            if (culledDots.length > state.nucleusGridQty) {
              const stride = culledDots.length / state.nucleusGridQty;
              dots3 = [];
              for (let i = 0; i < state.nucleusGridQty; i++) {
                dots3.push(culledDots[Math.floor(i * stride)]);
              }
            }
            const targetStatic = new Array(dots3.length);
            const targetDist = new Array(dots3.length);
            for (let i = 0; i < dots3.length; i++) {
              const p = dots3[i];
              let bestS = 0;
              let bestD = Infinity;
              for (let s = 0; s < staticPts.length; s++) {
                const sp = staticPts[s];
                const dx = p.x - sp.x;
                const dy = p.y - sp.y;
                const dz = p.z - sp.z;
                const d2 = dx * dx + dy * dy + dz * dz;
                if (d2 < bestD) {
                  bestD = d2;
                  bestS = s;
                }
              }
              targetStatic[i] = bestS;
              targetDist[i] = Math.sqrt(bestD);
            }

            const rowToDots = new Map();
            const rowToY = new Map();
            for (let i = 0; i < dots3.length; i++) {
              const r = dots3[i].row | 0;
              if (!rowToDots.has(r)) rowToDots.set(r, []);
              rowToDots.get(r).push(i);
              if (!rowToY.has(r)) rowToY.set(r, dots3[i].y);
            }

            const staticRow = new Array(staticPts.length);
            for (let s = 0; s < staticPts.length; s++) {
              const sy = staticPts[s].y;
              let bestRow = 0;
              let bestDy = Infinity;
              for (const [r, ry] of rowToY.entries()) {
                const dy = Math.abs(ry - sy);
                if (dy < bestDy) {
                  bestDy = dy;
                  bestRow = r;
                }
              }
              staticRow[s] = bestRow;
            }

            const parentHop = new Array(dots3.length);
            const maxHop = spacing * 5.2;
            const directThresh = spacing * 1.35;
            for (let i = 0; i < dots3.length; i++) {
              const p = dots3[i];
              const ts = targetStatic[i];
              const dSelf = targetDist[i];
              if (dSelf <= directThresh) {
                parentHop[i] = -1; // connect directly to static point
                continue;
              }
              const rowCur = p.row | 0;
              const rowDst = staticRow[ts] | 0;

              // One vertical move: if off target row, jump once to target row.
              if (rowCur !== rowDst) {
                let bestJ = -1;
                let bestScore = Infinity;
                const dstDots = rowToDots.get(rowDst) || [];
                for (let k = 0; k < dstDots.length; k++) {
                  const j = dstDots[k];
                  if (j === i) continue;
                  if (targetStatic[j] !== ts) continue;
                  const q = dots3[j];
                  const dx = p.x - q.x;
                  const dz = p.z - q.z;
                  const dy = p.y - q.y;
                  const hop = Math.hypot(dx, dy, dz);
                  if (hop > maxHop * 1.8) continue;
                  const dOther = targetDist[j];
                  const score = Math.abs(dx) + Math.abs(dz) + 0.35 * Math.abs(dy) + dOther * 0.2;
                  if (score < bestScore) {
                    bestScore = score;
                    bestJ = j;
                  }
                }
                parentHop[i] = bestJ >= 0 ? bestJ : -1;
                continue;
              }

              // Horizontal-only continuation on target row.
              const sp = staticPts[ts];
              const rowDots = rowToDots.get(rowCur) || [];
              let bestJ = -1;
              let bestScore = Infinity;
              const xSelf = Math.abs(p.x - sp.x);
              for (let k = 0; k < rowDots.length; k++) {
                const j = rowDots[k];
                if (j === i) continue;
                if (targetStatic[j] !== ts) continue;
                const q = dots3[j];
                const xOther = Math.abs(q.x - sp.x);
                if (xOther >= xSelf - 1e-6) continue; // must progress horizontally toward static
                const dx = p.x - q.x;
                const dz = p.z - q.z;
                const hop = Math.hypot(dx, dz);
                if (hop > maxHop) continue;
                const score = hop + xOther * 0.12 + Math.abs(q.z - sp.z) * 0.08;
                if (score < bestScore) {
                  bestScore = score;
                  bestJ = j;
                }
              }
              parentHop[i] = bestJ >= 0 ? bestJ : -1;
            }

            state.nucleusModel = { dots3, targetStatic, parentHop };
            state.nucleusModelKey = modelKey;
          }

          const model = state.nucleusModel;
          if (!model) return;
          const projection = tr;

          function projectDepth(p) {
            const x1 = p.x * projection.cy + p.z * projection.sy;
            const z1 = -p.x * projection.sy + p.z * projection.cy;
            const y1 = p.y;
            const y2 = y1 * projection.cp - z1 * projection.sp;
            const z2 = y1 * projection.sp + z1 * projection.cp;
            const screen = toCanvas({ x: x1, y: y2 });
            return { x: screen.x, y: screen.y, z: z2 };
          }

          ctx.save();
          const dots2 = [];
          const static2 = [];
          for (let i = 0; i < nStatic; i++) {
            static2.push(projectDepth(staticAnchorPoint3(i)));
          }
          for (let i = 0; i < model.dots3.length; i++) {
            const p2 = projectDepth(model.dots3[i]);
            dots2.push({ x: p2.x, y: p2.y, z: p2.z, i: i });
          }
          dots2.sort(function (a, b) {
            return a.z - b.z;
          });
          const dotByIndex = new Array(model.dots3.length);
          for (let i = 0; i < dots2.length; i++) {
            dotByIndex[dots2[i].i] = dots2[i];
          }

          function strokeElbowFillet(A, B, filletR, bendQty) {
            const dx = B.x - A.x;
            const dy = B.y - A.y;
            if (Math.abs(dx) < 0.8 || Math.abs(dy) < 0.8) {
              ctx.beginPath();
              ctx.moveTo(A.x, A.y);
              ctx.lineTo(B.x, B.y);
              ctx.stroke();
              return;
            }
            const bends = Math.max(0, Math.min(8, bendQty | 0));
            if (bends === 0) {
              ctx.beginPath();
              ctx.moveTo(A.x, A.y);
              ctx.lineTo(B.x, B.y);
              ctx.stroke();
              return;
            }
            const horizFirst = Math.abs(dx) >= Math.abs(dy);
            const pts = [{ x: A.x, y: A.y }];
            let curX = A.x;
            let curY = A.y;
            for (let bi = 1; bi <= bends; bi++) {
              const t = bi / (bends + 1);
              const xT = A.x + dx * t;
              const yT = A.y + dy * t;
              const horizStep = horizFirst ? (bi % 2 === 1) : (bi % 2 === 0);
              if (horizStep) {
                curX = xT;
              } else {
                curY = yT;
              }
              pts.push({ x: curX, y: curY });
            }
            pts.push({ x: B.x, y: B.y });

            ctx.beginPath();
            ctx.moveTo(pts[0].x, pts[0].y);
            for (let i = 1; i < pts.length - 1; i++) {
              const p = pts[i];
              const n = pts[i + 1];
              const segA = Math.hypot(p.x - pts[i - 1].x, p.y - pts[i - 1].y);
              const segB = Math.hypot(n.x - p.x, n.y - p.y);
              const r = Math.min(
                filletR,
                Math.max(0.7, Math.min(segA, segB) * 0.42),
              );
              ctx.arcTo(p.x, p.y, n.x, n.y, r);
            }
            ctx.lineTo(B.x, B.y);
            ctx.stroke();
          }

          const baseR = Math.max(0.45, 0.5 * 2.1 * state.markerSizeMul * state.nucleusDotSizeMul);
          const baseA = Math.max(0.05, Math.min(1, state.nucleusDotOpacity));
          const span = Math.max(1e-6, Math.max(AX, BY, CZ));

          ctx.lineCap = "round";
          ctx.lineJoin = "round";
          for (let i = 0; i < model.parentHop.length; i++) {
            const A = dotByIndex[i];
            if (!A) continue;
            const staticTarget = static2[model.targetStatic[i] || 0];
            const parent = model.parentHop[i];
            const B =
              state.nucleusHomeRunMode
                ? staticTarget
                : (parent >= 0 ? dotByIndex[parent] : staticTarget);
            if (!B) continue;
            const dx = B.x - A.x;
            const dy = B.y - A.y;
            const len = Math.hypot(dx, dy);
            if (len < 1.5) continue;
            const depth01 = 0.5 + 0.5 * (A.z / span);
            const alpha = baseA * (state.nucleusHomeRunMode ? 0.12 : (0.09 + 0.19 * depth01));
            ctx.strokeStyle = `rgba(224,236,255,${alpha})`;
            ctx.lineWidth = state.nucleusHomeRunMode
              ? 0.32 + 0.18 * depth01
              : 0.38 + 0.3 * depth01;
            if (state.nucleusHomeRunMode) {
              ctx.beginPath();
              ctx.moveTo(A.x, A.y);
              ctx.lineTo(B.x, B.y);
              ctx.stroke();
            } else {
              strokeElbowFillet(
                A,
                B,
                2.8 + 3.4 * state.pathFilletMul,
                state.nucleusBendQty,
              );
            }
          }

          for (let i = 0; i < dots2.length; i++) {
            const d = dots2[i];
            const depth01 = 0.5 + 0.5 * (d.z / span);
            const r = baseR * (0.72 + 0.62 * depth01);
            const a = baseA * (0.45 + 0.55 * depth01);
            ctx.fillStyle = `rgba(246, 250, 255, ${a})`;
            ctx.beginPath();
            ctx.arc(d.x, d.y, r, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = `rgba(255,255,255,${Math.min(0.55, a * 0.7)})`;
            ctx.lineWidth = Math.max(0.22, r * 0.2);
            ctx.stroke();
          }
          ctx.restore();
        }

        function canvasCssSize() {
          const cw = canvas.clientWidth;
          const ch = canvas.clientHeight;
          return { cw: cw > 0 ? cw : 1, ch: ch > 0 ? ch : 1 };
        }

        function frame() {
          const { cw, ch } = canvasCssSize();
          ctx.clearRect(0, 0, cw, ch);

          const t = trig();
          const b = boundsScene(t);
          const toCanvas = makeToCanvas(cw, ch, b);

          ctx.lineWidth = 1;
          ctx.lineJoin = "round";
          ctx.lineCap = "round";

          if (state.showSolidGeometry) {
            if (state.showVolume) {
              ctx.strokeStyle = "rgba(200, 220, 245, 0.2)";
              drawVolumeGrid(toCanvas, t);
            } else {
              drawEllipsoidSolidGeometry(toCanvas, t);
            }
          }

          if (state.showPanelSeams || state.showPanelDots) {
            drawBallPanels(toCanvas, t, cw, ch);
          }

          if (state.showMesh) {
            drawEllipsoidWireframe(toCanvas, t);
          }

          drawDataStoreNucleus(toCanvas, t, cw, ch);

          // Andromeda: pathfinder paths intentionally disabled.

          if (state.showStaticVolumePoints) {
            drawStaticVolumePoints(toCanvas, t);
          }

          if (state.showMarkers && markerFlat.length > 0) {
            drawVertexMarkers(toCanvas, t);
          }
        }

        function resize() {
          const { cw, ch } = canvasCssSize();
          const dpr = Math.min(window.devicePixelRatio || 1, 2);
          const w = Math.max(1, Math.floor(cw * dpr));
          const h = Math.max(1, Math.floor(ch * dpr));
          canvas.width = w;
          canvas.height = h;
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          frame();
        }

        function onPointerDown(e) {
          closeAllPopovers();
          if (e.button !== 0) return;
          const ttr = trig();
          const b = boundsScene(ttr);
          const { cw, ch } = canvasCssSize();
          const toCanvas = makeToCanvas(cw, ch, b);
          const hitFlat =
            state.showMarkers && markerFlat.length > 0
              ? pickMarkerAtCanvas(e.clientX, e.clientY, toCanvas, ttr)
              : null;
          if (hitFlat != null) {
            state.selectedMarkerFlat = hitFlat;
            const chains =
              markerFlat.length >= 4 ? buildMarkerChainsProximity(ttr) : [];
            state.selectedChainIndex = findChainIndexForFlat(hitFlat, chains);
            frame();
            return;
          }
          state.selectedMarkerFlat = null;
          state.selectedChainIndex = null;
          state.dragging = true;
          state.ptrId = e.pointerId;
          state.lastX = e.clientX;
          state.lastY = e.clientY;
          canvas.classList.add("is-dragging");
          canvas.setPointerCapture(e.pointerId);
        }

        function onPointerMove(e) {
          if (!state.dragging || e.pointerId !== state.ptrId) return;
          const dx = e.clientX - state.lastX;
          const dy = e.clientY - state.lastY;
          state.lastX = e.clientX;
          state.lastY = e.clientY;
          state.yaw += dx * ROT_SENS;
          state.pitch += dy * ROT_SENS;
          if (state.pitch < PITCH_MIN) state.pitch = PITCH_MIN;
          if (state.pitch > PITCH_MAX) state.pitch = PITCH_MAX;
          frame();
        }

        function onPointerUp(e) {
          if (e.pointerId !== state.ptrId) return;
          state.dragging = false;
          state.ptrId = null;
          canvas.classList.remove("is-dragging");
          try {
            canvas.releasePointerCapture(e.pointerId);
          } catch (_) {}
          frame();
        }

        function onWheel(e) {
          e.preventDefault();
          let z = state.zoom * Math.exp(-e.deltaY * ZOOM_SENS);
          if (z < ZOOM_MIN) z = ZOOM_MIN;
          if (z > ZOOM_MAX) z = ZOOM_MAX;
          state.zoom = z;
          frame();
        }

        function updateVolumeButtonLabel() {
          btnVolume.textContent = state.showVolume ? "Solid: 12×5×5" : "Solid: Ellipsoid";
          btnVolume.title = state.showVolume
            ? "Solid mode is 12×5×5 volume"
            : "Solid mode is ellipsoid";
        }

        function syncVolumeControlsFromState() {
          solidModeVolume.checked = state.showVolume;
          solidModeEllipsoid.checked = !state.showVolume;
          chkSolidGeometry.checked = state.showSolidGeometry;
          updateVolumeButtonLabel();
        }

        function closeAllPopovers() {
          state.openPopover = null;
          syncPopoverChrome();
        }

        function togglePopover(key) {
          state.openPopover = state.openPopover === key ? null : key;
          syncPopoverChrome();
        }

        function syncPopoverChrome() {
          const open = state.openPopover;
          toolAxisSlide.classList.toggle("chrome-tool--open", open === "axis-slide");
          btnAxisSlide.setAttribute("aria-expanded", open === "axis-slide" ? "true" : "false");
          toolPanels.classList.toggle("chrome-tool--open", open === "panels");
          btnPanels.setAttribute("aria-expanded", open === "panels" ? "true" : "false");
          toolVolume.classList.toggle("chrome-tool--open", open === "volume");
          btnVolume.setAttribute("aria-expanded", open === "volume" ? "true" : "false");
          toolMesh.classList.toggle("chrome-tool--open", open === "mesh");
          btnMesh.setAttribute("aria-expanded", open === "mesh" ? "true" : "false");
          toolMarkers.classList.toggle("chrome-tool--open", open === "markers");
          btnMarkers.setAttribute("aria-expanded", open === "markers" ? "true" : "false");
          toolPaths.classList.toggle("chrome-tool--open", open === "paths");
          btnPaths.setAttribute("aria-expanded", open === "paths" ? "true" : "false");
        }

        function syncChromePressedButtons() {
          const anyPanel = state.showPanelSeams || state.showPanelDots;
          btnPanels.classList.toggle("is-active", anyPanel);
          btnPanels.setAttribute("aria-pressed", anyPanel ? "true" : "false");
          btnMesh.classList.toggle("is-active", state.showMesh);
          btnMesh.setAttribute("aria-pressed", state.showMesh ? "true" : "false");
          btnMarkers.classList.toggle("is-active", state.showMarkers);
          btnMarkers.setAttribute("aria-pressed", state.showMarkers ? "true" : "false");
          btnPaths.classList.toggle("is-active", state.showPaths);
          btnPaths.setAttribute("aria-pressed", state.showPaths ? "true" : "false");
          btnVolume.classList.toggle("is-active", state.showSolidGeometry);
          btnVolume.setAttribute("aria-pressed", state.showSolidGeometry ? "true" : "false");
          btnAxisSlide.classList.toggle("is-active", state.axisSlideAnim);
          btnAxisSlide.setAttribute("aria-pressed", state.axisSlideAnim ? "true" : "false");
        }

        function updatePanelControlsDisabled() {
          const panelOn = state.showPanelSeams || state.showPanelDots;
          chkPanelUniform.disabled = !panelOn;
          panelWrapJitterInput.disabled = !panelOn;
          panelTightnessInput.disabled = !panelOn;
          panelLineDashInput.disabled = !state.showPanelSeams;
          panelDotDensityInput.disabled = !state.showPanelDots;
          panelSeamSeedInput.disabled = !panelOn;
          panelLinkSkipInput.disabled = !state.showPanelDots;
          panelTransitSpineInput.disabled = !state.showPanelDots;
          btnPanelSeamReseed.disabled = !panelOn;
        }

        function updateMeshControlsDisabled() {
          const m = state.showMesh;
          meshOpacityInput.disabled = !m;
          irregularSeedInput.disabled = !m;
          irregularScaleInput.disabled = !m;
        }

        function updateMarkerControlsDisabled() {
          markerCountInput.disabled = !state.showMarkers;
          markerSizeInput.disabled = !state.showMarkers;
          pathFilletInput.disabled = !state.showPaths;
          pathHandleInput.disabled = !state.showPaths;
          pathExtendInput.disabled = !state.showPaths;
        }

        function syncPanelTogglesFromState() {
          chkPanelSeams.checked = state.showPanelSeams;
          chkPanelDots.checked = state.showPanelDots;
          chkPanelUniform.checked = state.panelUniformWrap;
          updatePanelControlsDisabled();
        }

        btnVolume.addEventListener("click", function (ev) {
          ev.stopPropagation();
          togglePopover("volume");
        });

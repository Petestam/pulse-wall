<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ellipsoid 2:1:1 · blue gradient</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        font-family: system-ui, sans-serif;
      }
      body {
        background: #050a1f;
      }
      #bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        display: block;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }
      /* Largest 12×5 (topology tile) rectangle inside the window */
      .viewport-stage {
        position: fixed;
        inset: 0;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
      }
      .viewport-12x5 {
        pointer-events: auto;
        position: relative;
        width: min(100vw, calc(100vh * 12 / 5));
        height: min(100vh, calc(100vw * 5 / 12));
        flex-shrink: 0;
        border-radius: 2px;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.14);
        overflow: hidden;
      }
      #viz {
        position: absolute;
        inset: 0;
        display: block;
        width: 100%;
        height: 100%;
        background: transparent;
        touch-action: none;
        cursor: grab;
      }
      #viz.is-dragging {
        cursor: grabbing;
      }
      .chrome {
        position: fixed;
        left: 16px;
        bottom: 16px;
        z-index: 2;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
        font-size: 12px;
      }
      .chrome a {
        color: rgba(255, 255, 255, 0.45);
        text-decoration: none;
      }
      .chrome a:hover {
        color: rgba(255, 255, 255, 0.85);
      }
      .chrome button {
        border: 1px solid rgba(255, 255, 255, 0.28);
        background: rgba(5, 10, 31, 0.55);
        color: rgba(230, 248, 255, 0.9);
        padding: 8px 14px;
        font-size: 11px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        cursor: pointer;
        border-radius: 2px;
      }
      .chrome button:hover {
        border-color: rgba(0, 210, 255, 0.45);
        color: #fff;
      }
      .chrome button.is-active {
        border-color: rgba(0, 210, 255, 0.65);
        box-shadow: 0 0 14px rgba(0, 185, 255, 0.25);
        color: #f4fbff;
      }
      .chrome .sep {
        color: rgba(255, 255, 255, 0.25);
        user-select: none;
      }
      .chrome-bg-ctrl {
        display: inline-flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px 14px;
        margin-left: 4px;
        font-size: 10px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.42);
      }
      .chrome-bg-ctrl label {
        display: inline-flex;
        align-items: center;
        gap: 5px;
      }
      .chrome-bg-ctrl input[type="range"] {
        width: 84px;
        vertical-align: middle;
      }
      .chrome-bg-ctrl__val {
        min-width: 1.75em;
        font-variant-numeric: tabular-nums;
        color: rgba(255, 255, 255, 0.55);
      }
      .chrome-tools {
        display: inline-flex;
        align-items: flex-end;
        gap: 6px;
      }
      .chrome-tool {
        position: relative;
        display: inline-flex;
        flex-direction: column;
        align-items: stretch;
      }
      .chrome-tool__pop {
        position: absolute;
        bottom: 100%;
        left: 0;
        z-index: 4;
        margin-bottom: 6px;
        min-width: 212px;
        padding: 10px 12px;
        background: rgba(5, 10, 31, 0.94);
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 4px;
        box-shadow: 0 -6px 28px rgba(0, 0, 0, 0.4);
        color: rgba(230, 248, 255, 0.9);
        font-size: 10px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        opacity: 0;
        visibility: hidden;
        max-height: 0;
        overflow: hidden;
        pointer-events: none;
        transition:
          opacity 0.18s ease,
          max-height 0.22s ease,
          visibility 0.18s;
      }
      .chrome-tool.chrome-tool--open .chrome-tool__pop {
        opacity: 1;
        visibility: visible;
        /* Cap below the top of the window; scroll when content is taller */
        max-height: min(85vh, 720px);
        overflow-x: hidden;
        overflow-y: auto;
        overscroll-behavior: contain;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: thin;
        scrollbar-color: rgba(0, 210, 255, 0.35) transparent;
        pointer-events: auto;
      }
      .chrome-tool.chrome-tool--open .chrome-tool__pop::-webkit-scrollbar {
        width: 6px;
      }
      .chrome-tool.chrome-tool--open .chrome-tool__pop::-webkit-scrollbar-thumb {
        background: rgba(0, 210, 255, 0.35);
        border-radius: 3px;
      }
      .chrome-tool__pop button.chrome-tool__reseed {
        width: 100%;
        margin-top: 8px;
        padding: 7px 10px;
        font-size: 10px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        border: 1px solid rgba(255, 255, 255, 0.28);
        background: rgba(5, 10, 31, 0.55);
        color: rgba(230, 248, 255, 0.9);
        border-radius: 2px;
        cursor: pointer;
      }
      .chrome-tool__pop button.chrome-tool__reseed:hover {
        border-color: rgba(0, 210, 255, 0.45);
        color: #fff;
      }
      .chrome-tool__pop label {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .chrome-tool__pop label + label {
        margin-top: 10px;
      }
      .chrome-tool__pop .slide-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .chrome-tool__pop .slide-val {
        flex-shrink: 0;
        min-width: 3em;
        text-align: right;
        color: rgba(255, 255, 255, 0.55);
        font-size: 10px;
        font-variant-numeric: tabular-nums;
      }
      .chrome-tool__pop .chrome-tool__subhead {
        margin: 0 0 6px;
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: rgba(0, 210, 255, 0.55);
      }
      .chrome-tool__pop .chrome-tool__subhead:not(:first-child) {
        margin-top: 12px;
      }
      .chrome-tool__pop .chrome-tool__toggles {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 8px;
      }
      .chrome-tool__pop .chrome-tool__toggles label {
        flex-direction: row;
        align-items: center;
        gap: 6px;
        text-transform: none;
        letter-spacing: 0.03em;
        font-size: 10px;
        cursor: pointer;
      }
      .chrome-tool__pop .chrome-tool__toggles input {
        accent-color: rgba(0, 210, 255, 0.75);
      }
      .chrome-tool__pop input[type="range"] {
        width: 100%;
        min-width: 0;
        accent-color: rgba(0, 210, 255, 0.75);
      }
      .chrome-tool__row {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .chrome-tool__val {
        flex-shrink: 0;
        min-width: 2.5em;
        text-align: right;
        font-variant-numeric: tabular-nums;
        color: rgba(255, 255, 255, 0.5);
        font-size: 10px;
      }
    </style>
  </head>
  <body>
    <canvas id="bg" width="300" height="150" aria-hidden="true"></canvas>
    <div class="viewport-stage" aria-hidden="true">
      <div class="viewport-12x5" id="viewport-12x5">
        <canvas
          id="viz"
          aria-label="Ellipsoid in 12×5×5 volume — drag to rotate, scroll to zoom, Reset view for 12×5 front"
        ></canvas>
      </div>
    </div>
    <div class="chrome">
      <button type="button" id="btn-reset" title="12×5 front (XY) · zoom 100%">
        Reset view
      </button>
      <div class="chrome-tool" id="tool-volume">
        <div class="chrome-tool__pop" id="pop-volume" role="region" aria-label="Solid mode">
          <p class="chrome-tool__subhead">Solid mode</p>
          <div class="chrome-tool__toggles">
            <label>
              <input type="radio" name="solid-mode" id="solid-mode-ellipsoid" checked />
              <span>Ellipsoid</span>
            </label>
            <label>
              <input type="radio" name="solid-mode" id="solid-mode-volume" />
              <span>12×5×5 volume</span>
            </label>
          </div>
          <div class="chrome-tool__toggles">
            <label>
              <input type="checkbox" id="chk-solid-geometry" />
              <span>Show solid geometry</span>
            </label>
          </div>
        </div>
        <button type="button" id="btn-volume" aria-pressed="false" aria-expanded="false" title="Solid mode and geometry">
          Solid: Ellipsoid
        </button>
      </div>
      <div class="chrome-tools" role="group" aria-label="Slide axes">
        <div class="chrome-tool" id="tool-axis-slide">
          <div class="chrome-tool__pop" id="pop-axis-slide" role="region" aria-label="Slide axes and mesh slide">
            <p class="chrome-tool__subhead">Surface slide</p>
            <div class="chrome-tool__toggles">
              <label>
                <input type="checkbox" id="chk-axis-slide-anim" />
                <span>Animate slide</span>
              </label>
            </div>
            <label>
              <span>Animation speed</span>
              <div class="slide-row">
                <input type="range" id="slide-anim-speed" min="10" max="250" value="100" step="5" />
                <span class="slide-val" id="slide-anim-speed-val">100%</span>
              </div>
            </label>
            <p class="chrome-tool__subhead">Mesh slide</p>
            <label>
              <span>Angle (0° = azimuth · 90° = colatitude)</span>
              <div class="slide-row">
                <input type="range" id="slide-angle" min="0" max="90" value="50" step="1" />
                <span class="slide-val" id="slide-angle-val">50°</span>
              </div>
            </label>
            <label>
              <span>V offset (azimuth phase)</span>
              <div class="slide-row">
                <input type="range" id="slide-off-v" min="0" max="360" value="0" step="2" />
                <span class="slide-val" id="slide-off-v-val">0°</span>
              </div>
            </label>
            <label>
              <span>U offset (colatitude wave phase)</span>
              <div class="slide-row">
                <input type="range" id="slide-off-u" min="0" max="360" value="0" step="2" />
                <span class="slide-val" id="slide-off-u-val">0°</span>
              </div>
            </label>
          </div>
          <button type="button" id="btn-axis-slide" aria-pressed="false" aria-expanded="false" title="Mesh slide on the ellipsoid — open for controls">
            Slide axes
          </button>
        </div>
      </div>
      <div class="chrome-tools" role="group" aria-label="Panels, mesh, markers">
        <div class="chrome-tool" id="tool-panels">
          <div class="chrome-tool__pop" id="pop-panels" role="region" aria-label="Panel seams">
            <div class="chrome-tool__toggles">
              <label>
                <input type="checkbox" id="chk-panel-seams" />
                <span>Seam lines</span>
              </label>
              <label>
                <input type="checkbox" id="chk-panel-dots" checked />
                <span>Seam dots</span>
              </label>
              <label>
                <input type="checkbox" id="chk-panel-uniform" checked />
                <span>Uniform wrap</span>
              </label>
            </div>
            <label>
              <span>Wrap jitter</span>
              <div class="chrome-tool__row">
                <input type="range" id="panel-wrap-jitter" min="0" max="100" value="35" step="1" />
                <span class="chrome-tool__val" id="panel-wrap-jitter-val">35%</span>
              </div>
            </label>
            <label>
              <span>Panel tightness (seam count)</span>
              <div class="chrome-tool__row">
                <input type="range" id="panel-tightness" min="3" max="12" value="6" step="1" />
                <span class="chrome-tool__val" id="panel-tightness-val">6</span>
              </div>
            </label>
            <label>
              <span>Seam dot density (0–100)</span>
              <div class="chrome-tool__row">
                <input type="range" id="panel-dot-density" min="0" max="100" value="3" step="1" />
                <span class="chrome-tool__val" id="panel-dot-val">3</span>
              </div>
            </label>
            <label>
              <span>Seam layout seed</span>
              <div class="chrome-tool__row">
                <input type="range" id="panel-seam-seed" min="0" max="2000" value="0" step="1" />
                <span class="chrome-tool__val" id="panel-seam-seed-val">0</span>
              </div>
            </label>
            <label>
              <span>Panel link skip (adjacent dots on same seam)</span>
              <div class="chrome-tool__row">
                <input type="range" id="panel-link-skip" min="0" max="12" value="2" step="1" />
                <span class="chrome-tool__val" id="panel-link-skip-val">2</span>
              </div>
            </label>
            <button type="button" class="chrome-tool__reseed" id="btn-panel-seam-reseed" title="Random seam layout">
              Reseed seams
            </button>
            <label>
              <span>Panel seam lines</span>
              <div class="chrome-tool__row">
                <input type="range" id="panel-line-dash" min="0" max="100" value="42" step="1" />
                <span class="chrome-tool__val" id="panel-line-val">42</span>
              </div>
            </label>
          </div>
          <button type="button" id="btn-panels" aria-pressed="false" aria-expanded="false" title="Volleyball / soccer-style panel seams — click for options">
            Panels
          </button>
        </div>
        <div class="chrome-tool" id="tool-mesh">
          <div class="chrome-tool__pop" id="pop-mesh" role="region" aria-label="Mesh">
            <div class="chrome-tool__toggles">
              <label>
                <input type="checkbox" id="chk-mesh-show" />
                <span>Show wireframe</span>
              </label>
            </div>
            <label>
              <span>Wire opacity</span>
              <div class="chrome-tool__row">
                <input type="range" id="mesh-opacity" min="15" max="100" value="100" step="1" />
                <span class="chrome-tool__val" id="mesh-opacity-val">100%</span>
              </div>
            </label>
            <p class="chrome-tool__subhead">Irregular mesh</p>
            <label>
              <span>Seed (shift noise field)</span>
              <div class="slide-row">
                <input type="range" id="irregular-seed" min="0" max="2000" value="0" step="1" />
                <span class="slide-val" id="irregular-seed-val">0</span>
              </div>
            </label>
            <label>
              <span>Scale (jitter strength)</span>
              <div class="slide-row">
                <input type="range" id="irregular-scale" min="0" max="250" value="100" step="1" />
                <span class="slide-val" id="irregular-scale-val">100%</span>
              </div>
            </label>
          </div>
          <button type="button" id="btn-mesh" aria-pressed="false" aria-expanded="false" title="Ellipsoid wireframe — click for opacity and irregular mesh">
            Mesh
          </button>
        </div>
        <div class="chrome-tool" id="tool-markers">
          <div class="chrome-tool__pop" id="pop-markers" role="region" aria-label="Vertex markers">
            <div class="chrome-tool__toggles">
              <label>
                <input type="checkbox" id="chk-markers-show" checked />
                <span>Show vertex markers</span>
              </label>
            </div>
            <label>
              <span>Count</span>
              <div class="chrome-tool__row">
                <input type="range" id="marker-count" min="0" max="2016" value="50" step="1" />
                <span class="chrome-tool__val" id="marker-count-val">50</span>
              </div>
            </label>
            <label>
              <span>Dot size</span>
              <div class="chrome-tool__row">
                <input type="range" id="marker-size" min="50" max="500" value="300" step="5" />
                <span class="chrome-tool__val" id="marker-size-val">3.00x</span>
              </div>
            </label>
          </div>
          <button type="button" id="btn-markers" class="is-active" aria-pressed="true" aria-expanded="false" title="White dots on mesh vertices — click for count">
            Markers
          </button>
        </div>
        <div class="chrome-tool" id="tool-paths">
          <div class="chrome-tool__pop" id="pop-paths" role="region" aria-label="Pathfinder">
            <div class="chrome-tool__toggles">
              <label>
                <input type="checkbox" id="chk-paths-show" checked />
                <span>Show paths</span>
              </label>
              <label>
                <input type="checkbox" id="chk-path-through" checked />
                <span>Through points</span>
              </label>
              <label>
                <input type="checkbox" id="chk-static-volume-points" checked />
                <span>Static volume points (10 · 6/8 inset from outer shell)</span>
              </label>
            </div>
            <label>
              <span>Fillet amount</span>
              <div class="chrome-tool__row">
                <input type="range" id="path-fillet" min="0" max="500" value="100" step="5" />
                <span class="chrome-tool__val" id="path-fillet-val">1.00x</span>
              </div>
            </label>
            <label>
              <span>Offset orb size</span>
              <div class="chrome-tool__row">
                <input type="range" id="path-handle" min="0" max="260" value="100" step="1" />
                <span class="chrome-tool__val" id="path-handle-val">1.00x</span>
              </div>
            </label>
            <label>
              <span>Offset orb rotation</span>
              <div class="chrome-tool__row">
                <input type="range" id="path-extend" min="0" max="360" value="0" step="1" />
                <span class="chrome-tool__val" id="path-extend-val">0°</span>
              </div>
            </label>
          </div>
          <button type="button" id="btn-paths" class="is-active" aria-pressed="true" aria-expanded="false" title="Static pathfinder connections — click for controls">
            Pathfinder
          </button>
        </div>
      </div>
      <div class="chrome-bg-ctrl" role="group" aria-label="Background gradient">
        <label>
          <span>Waves</span>
          <input type="range" id="bg-wave-freq" min="0" max="100" value="58" step="1" title="Particle wave frequency" />
          <span class="chrome-bg-ctrl__val" id="bg-wave-freq-val">58</span>
        </label>
        <label>
          <span>Contrast</span>
          <input type="range" id="bg-wave-contrast" min="0" max="100" value="52" step="1" title="Particle wave contrast" />
          <span class="chrome-bg-ctrl__val" id="bg-wave-contrast-val">52</span>
        </label>
      </div>
      <span class="sep">·</span>
      <a href="blank-gradient-fabric.html">Fabric explore</a>
      <span class="sep">·</span>
      <a href="generative.html">Strand field</a>
      <span class="sep">·</span>
      <a href="index.html">Topology editor</a>
    </div>
    <script>
      (function () {
        "use strict";
        const canvas = document.getElementById("bg");
        const ctx = canvas.getContext("2d", { alpha: false });
        let cssW = 300;
        let cssH = 150;

        const BLOB_COUNT = 9;
        const T0 = performance.now();
        const MAX_GRID_CELLS = 12500;

        const bgWaveFreqInput = document.getElementById("bg-wave-freq");
        const bgWaveContrastInput = document.getElementById("bg-wave-contrast");
        const bgWaveFreqVal = document.getElementById("bg-wave-freq-val");
        const bgWaveContrastVal = document.getElementById("bg-wave-contrast-val");
        function syncBgValLabels() {
          if (bgWaveFreqVal && bgWaveFreqInput) {
            bgWaveFreqVal.textContent = String(bgWaveFreqInput.value);
          }
          if (bgWaveContrastVal && bgWaveContrastInput) {
            bgWaveContrastVal.textContent = String(bgWaveContrastInput.value);
          }
        }
        if (bgWaveFreqInput) bgWaveFreqInput.addEventListener("input", syncBgValLabels);
        if (bgWaveContrastInput) bgWaveContrastInput.addEventListener("input", syncBgValLabels);
        syncBgValLabels();

        function resize() {
          const dpr = Math.min(window.devicePixelRatio || 1, 2);
          cssW = window.innerWidth;
          cssH = window.innerHeight;
          canvas.width = Math.max(1, Math.floor(cssW * dpr));
          canvas.height = Math.max(1, Math.floor(cssH * dpr));
          canvas.style.width = cssW + "px";
          canvas.style.height = cssH + "px";
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        function drawBlob(cx, cy, r, stops) {
          const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
          for (let i = 0; i < stops.length; i++) {
            g.addColorStop(stops[i][0], stops[i][1]);
          }
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(cx, cy, r, 0, Math.PI * 2);
          ctx.fill();
        }

        function tick(now) {
          const fq = bgWaveFreqInput ? Number(bgWaveFreqInput.value) : 50;
          const ct = bgWaveContrastInput ? Number(bgWaveContrastInput.value) : 50;
          const freqScale = 0.35 + (Math.max(0, Math.min(100, fq)) / 100) * 2.15;
          const contrastMul = 0.35 + (Math.max(0, Math.min(100, ct)) / 100) * 1.65;
          const waveAmp = 0.52 + (ct / 100) * 0.78;
          const t = (now - T0) * 0.001 * freqScale;
          const w = cssW;
          const h = cssH;
          const m = Math.min(w, h);
          let gridStep = Math.max(7, Math.min(11, Math.floor(m / 85)));
          let cols = Math.ceil(w / gridStep) + 3;
          let rows = Math.ceil(h / gridStep) + 3;
          while (cols * rows > MAX_GRID_CELLS && gridStep < 22) {
            gridStep++;
            cols = Math.ceil(w / gridStep) + 3;
            rows = Math.ceil(h / gridStep) + 3;
          }

          ctx.fillStyle = "#050a1f";
          ctx.fillRect(0, 0, w, h);

          const shift = Math.sin(t * 0.09) * w * 0.05 + Math.cos(t * 0.055) * w * 0.035;
          const tilt = Math.sin(t * 0.035) * 0.1;
          const x1 = shift;
          const y1 = tilt * h;
          const x2 = w + shift * 0.28;
          const y2 = h - tilt * h;
          const baseGrad = ctx.createLinearGradient(x1, y1, x2, y2);
          baseGrad.addColorStop(0, "rgba(72, 188, 245, 0.92)");
          baseGrad.addColorStop(0.28 + Math.sin(t * 0.07) * 0.03, "rgba(38, 78, 210, 0.88)");
          baseGrad.addColorStop(0.58 + Math.cos(t * 0.05) * 0.025, "rgba(22, 48, 150, 0.9)");
          baseGrad.addColorStop(0.82, "rgba(8, 14, 45, 0.95)");
          baseGrad.addColorStop(1, "#050a1f");
          ctx.globalAlpha = 0.72;
          ctx.fillStyle = baseGrad;
          ctx.fillRect(0, 0, w, h);
          ctx.globalAlpha = 1;

          ctx.globalCompositeOperation = "screen";
          for (let i = 0; i < BLOB_COUNT; i++) {
            const k = i + 0.37;
            const bx =
              w *
              (0.5 +
                0.44 * Math.sin(t * 0.058 + k * 1.17) * Math.cos(t * 0.038 + k * 0.51) +
                0.06 * Math.sin(t * 0.16 + k));
            const by =
              h *
              (0.48 +

        function expandBounds(q, b) {

          if (q.x > b.maxX) b.maxX = q.x;

          const du = Math.PI / Math.max(1, U_SEG - 1);
          const dv = (2 * Math.PI) / V_SEG;
          for (let i = 0; i < U_SEG; i++) {

          const scale = baseScale * state.zoom;
          const cx = (b.minX + b.maxX) * 0.5;
          const cy0 = (b.minY + b.maxY) * 0.5;
          return function toCanvas(q) {

              x: (q.x - cx) * scale + cw * 0.5,

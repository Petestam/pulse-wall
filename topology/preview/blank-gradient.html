              const p0 = toCanvas(project(meshSurfacePoint(u0, v, i, j), t));
              const p1 = toCanvas(project(meshSurfacePoint(u1, v, i + 1, j), t));
              ctx.moveTo(p0.x, p0.y);
              ctx.lineTo(p1.x, p1.y);
            }
          }
          for (let i = 0; i < U_SEG; i++) {
            const u = i * du;
            for (let j = 0; j < V_SEG; j++) {
              const v0 = j * dv;
              const v1 = ((j + 1) % V_SEG) * dv;
              const jn = (j + 1) % V_SEG;
              const p0 = toCanvas(project(meshSurfacePoint(u, v0, i, j), t));
              const p1 = toCanvas(project(meshSurfacePoint(u, v1, i, jn), t));
              ctx.moveTo(p0.x, p0.y);
              ctx.lineTo(p1.x, p1.y);
            }
          }
          ctx.strokeStyle = `rgba(255, 255, 255, ${0.42 * Math.max(0.08, Math.min(1, state.meshOpacity))})`;
          ctx.stroke();
        }

        /** Solid overlay for ellipsoid mode (independent of irregular mesh opacity controls). */
        function drawEllipsoidSolidGeometry(toCanvas, t) {
          const du = Math.PI / Math.max(1, U_SEG - 1);
          const dv = (2 * Math.PI) / V_SEG;
          ctx.beginPath();
          for (let j = 0; j < V_SEG; j++) {
            const v = j * dv;
            for (let i = 0; i < U_SEG - 1; i++) {
              const u0 = i * du;
              const u1 = (i + 1) * du;
              const p0 = toCanvas(project(solidShellPointNoSlide(u0, v), t));
              const p1 = toCanvas(project(solidShellPointNoSlide(u1, v), t));
              ctx.moveTo(p0.x, p0.y);
              ctx.lineTo(p1.x, p1.y);
            }
          }
          for (let i = 0; i < U_SEG; i++) {
            const u = i * du;
            for (let j = 0; j < V_SEG; j++) {
              const v0 = j * dv;
              const v1 = ((j + 1) % V_SEG) * dv;
              const p0 = toCanvas(project(solidShellPointNoSlide(u, v0), t));
              const p1 = toCanvas(project(solidShellPointNoSlide(u, v1), t));
              ctx.moveTo(p0.x, p0.y);
              ctx.lineTo(p1.x, p1.y);
            }
          }
          ctx.strokeStyle = "rgba(0, 210, 255, 0.22)";
          ctx.stroke();
        }

        function rebuildMarkers() {
          const total = U_SEG * V_SEG;
          const n = Math.min(Math.max(0, state.markerCount | 0), total);
          markerFlat.length = 0;
          if (n === 0) {
            state.selectedMarkerFlat = null;
            state.selectedChainIndex = null;
            return;
          }
          const order = [];
          for (let i = 0; i < total; i++) order.push(i);
          let rng = 2166136261;
          function nextRand() {
            rng = (Math.imul(rng, 48271) + 11) >>> 0;
            return rng / 4294967296;
          }
          for (let i = total - 1; i > 0; i--) {
            const j = Math.floor(nextRand() * (i + 1));
            const tmp = order[i];
            order[i] = order[j];
            order[j] = tmp;
          }
          for (let k = 0; k < n; k++) markerFlat.push(order[k]);
          if (
            state.selectedMarkerFlat != null &&
            markerFlat.indexOf(state.selectedMarkerFlat) < 0
          ) {
            state.selectedMarkerFlat = null;
            state.selectedChainIndex = null;
          }
        }

        function markerScreenPos(flat, toCanvas, t) {
          const du = Math.PI / Math.max(1, U_SEG - 1);
          const dv = (2 * Math.PI) / V_SEG;
          const j = flat % V_SEG;
          const i = Math.floor(flat / V_SEG);
          const u = i * du;
          const v = j * dv;
          return toCanvas(project(meshSurfacePoint(u, v, i, j), t));
        }

        function pairHash01(f0, f1, salt) {
          const h = ((f0 * 73856093) ^ (f1 * 19349663) ^ (salt * 83492791)) >>> 0;
          return h / 4294967296;
        }

        function strokeConnectionWideBezier(ax, ay, bx, by, curl01, idA, idB, seamS) {
          const dx = bx - ax;
          const dy = by - ay;
          const len = Math.hypot(dx, dy);
          if (len < 1.2) return;
          const ux = dx / len;
          const uy = dy / len;
          const px = -uy;
          const py = ux;
          const c = Math.max(0, Math.min(1, curl01));
          const h1 = pairHash01(idA, idB, seamS);
          const h2 = pairHash01(idA, idB, seamS + 23);
          const s1 = pairHash01(idA, idB, seamS + 41) < 0.5 ? -1 : 1;
          const s2 = pairHash01(idA, idB, seamS + 59) < 0.5 ? -1 : 1;
          const bulge = c * len * 0.38;
          const t1 = 0.26 + h1 * 0.12;
          const t2 = 0.62 + h2 * 0.12;
          const cp1x = ax + ux * len * t1 + px * s1 * bulge * (0.4 + 0.6 * h1);
          const cp1y = ay + uy * len * t1 + py * s1 * bulge * (0.4 + 0.6 * h1);
          const cp2x = ax + ux * len * t2 + px * s2 * bulge * (0.35 + 0.65 * h2);
          const cp2y = ay + uy * len * t2 + py * s2 * bulge * (0.35 + 0.65 * h2);
          ctx.beginPath();
          ctx.moveTo(ax, ay);
          ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, bx, by);
          ctx.stroke();
        }

        /**
         * Wide cubic Bézier with start tangent along unit (tx, ty); end uses chord toward target.
         * `strandJitter` scales extra lateral wobble so strands are not straight (0–1).
         */
        function strokeConnectionWideBezierTangentStart(
          ax,
          ay,
          bx,
          by,
          tx,
          ty,
          curl01,
          idA,
          idB,
          seamS,
          strandJitter,
        ) {
          const dx = bx - ax;
          const dy = by - ay;
          const len = Math.hypot(dx, dy);
          if (len < 1.2) return;
          const ux = dx / len;
          const uy = dy / len;
          const px = -ty;
          const py = tx;
          const qx = -uy;
          const qy = ux;
          const c = Math.max(0, Math.min(1, curl01));
          const h1 = pairHash01(idA, idB, seamS);
          const h2 = pairHash01(idA, idB, seamS + 23);
          const s1 = pairHash01(idA, idB, seamS + 41) < 0.5 ? -1 : 1;
          const s2 = pairHash01(idA, idB, seamS + 59) < 0.5 ? -1 : 1;
          const sj =
            strandJitter !== undefined && strandJitter !== null
              ? strandJitter
              : 0.48;
          const bulge = c * len * 0.38 * (1 + 0.62 * sj);
          const t1 = 0.24 + h1 * 0.14;
          const t2 = 0.58 + h2 * 0.14;
          const w1 = len * 0.085 * sj * (pairHash01(idA, idB, seamS + 211) - 0.5) * 2;
          const w2 = len * 0.055 * sj * (pairHash01(idA, idB, seamS + 223) - 0.5) * 2;
          const cp1x =
            ax +
            tx * len * t1 +
            px * s1 * bulge * (0.4 + 0.6 * h1) +
            px * w1;
          const cp1y =
            ay +
            ty * len * t1 +
            py * s1 * bulge * (0.4 + 0.6 * h1) +
            py * w1;
          const cp2x =
            ax +
            ux * len * t2 +
            qx * s2 * bulge * (0.35 + 0.65 * h2) +
            qx * w2 +
            px * w1 * 0.55;
          const cp2y =
            ay +
            uy * len * t2 +
            qy * s2 * bulge * (0.35 + 0.65 * h2) +
            qy * w2 +
            py * w1 * 0.55;
          ctx.beginPath();
          ctx.moveTo(ax, ay);
          ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, bx, by);
          ctx.stroke();
        }

        function panelLinkAllowedSameSeam(ciA, mA, ciB, mB, skip) {
          if (ciA !== ciB) return true;
          return Math.abs(mA - mB) > skip;
        }

        /**
         * One marker-to-marker segment with correction fillet in middle-third chord span:
         * corner target K is placed along A→B at t in [1/3, 2/3], then offset normal.
         */
        function drawMarkerMidFilletSegment(A, B, idA, idB, salt) {
          const dx = B.x - A.x;
          const dy = B.y - A.y;
          const len = Math.hypot(dx, dy);
          if (len < 1e-6) return;
          const ux = dx / len;
          const uy = dy / len;
          const nx = -uy;
          const ny = ux;
          const t = 1 / 3 + pairHash01(idA, idB, salt + 17) * (1 / 3);
          const sign = pairHash01(idA, idB, salt + 29) < 0.5 ? -1 : 1;
          const bend = sign * MARKER_MID_BEND_FRAC * len;
          const K = {
            x: A.x + ux * (t * len) + nx * bend,
            y: A.y + uy * (t * len) + ny * bend,
          };
          const r = Math.max(
            0.85,
            Math.min(MARKER_FILLET_R_MAX, MARKER_FILLET_FRAC * len),
          ) * state.pathFilletMul;
          if (r <= 0) {
            ctx.beginPath();
            ctx.moveTo(A.x, A.y);
            ctx.lineTo(B.x, B.y);
            ctx.stroke();
            return;
          }
          ctx.beginPath();
          ctx.moveTo(A.x, A.y);
          ctx.arcTo(K.x, K.y, B.x, B.y, r);
          ctx.lineTo(B.x, B.y);
          ctx.stroke();
        }

        /** A→B→C→D with per-segment middle-third fillets (AB, BC, CD). */
        function strokeMarkerChainElbows(A, B, C, D, f1, f2, f3, f4) {
          drawMarkerMidFilletSegment(A, B, f1, f2, 1);
          drawMarkerMidFilletSegment(B, C, f2, f3, 2);
          drawMarkerMidFilletSegment(C, D, f3, f4, 3);
        }

        function flatToWorld3(flat, t) {
          const du = Math.PI / Math.max(1, U_SEG - 1);
          const dv = (2 * Math.PI) / V_SEG;
          const j = flat % V_SEG;
          const i = Math.floor(flat / V_SEG);
          const u = i * du;
          const v = j * dv;
          return meshSurfacePoint(u, v, i, j);
        }

        function distWorld3(a, b) {
          return Math.hypot(a.x - b.x, a.y - b.y, a.z - b.z);
        }

        /**
         * Greedy chains of four markers along surface proximity (nearest-neighbor from a seed),
         * so paths tend to wrap the ellipsoid instead of jumping across quarters of the list.
         */
        function buildMarkerChainsProximity(t) {
          const n = markerFlat.length;
          let q = Math.floor(n / 8);
          if (q < 1 && n >= 4) q = 1;
          if (q < 1) return [];
          const world = [];
          for (let k = 0; k < n; k++) world.push(flatToWorld3(markerFlat[k], t));
          const unused = new Set();
          for (let k = 0; k < n; k++) unused.add(k);
          const chains = [];
          for (let c = 0; c < q; c++) {
            let minK = null;
            let minFlat = Infinity;
            for (const k of unused) {
              if (markerFlat[k] < minFlat) {
                minFlat = markerFlat[k];
                minK = k;
              }
            }
            if (minK === null) break;
            const m1 = minK;
            unused.delete(m1);
            function nearestIdx(fromK) {
              const p = world[fromK];
              let bestK = null;
              let bestD = Infinity;
              for (const k of unused) {
                const d = distWorld3(p, world[k]);
                if (d < bestD) {
                  bestD = d;
                  bestK = k;
                }
              }
              return bestK;
            }
            const k2 = nearestIdx(m1);
            if (k2 === null) break;
            unused.delete(k2);
            const k3 = nearestIdx(k2);
            if (k3 === null) break;
            unused.delete(k3);
            const k4 = nearestIdx(k3);
            if (k4 === null) break;
            unused.delete(k4);
            chains.push([markerFlat[m1], markerFlat[k2], markerFlat[k3], markerFlat[k4]]);
          }
          return chains;
        }

        function findChainIndexForFlat(flat, chains) {
          if (!chains) return null;
          for (let i = 0; i < chains.length; i++) {
            if (chains[i].indexOf(flat) >= 0) return i;
          }
          return null;
        }

        function pickMarkerAtCanvas(clientX, clientY, toCanvas, t) {
          const rect = canvas.getBoundingClientRect();
          const px = clientX - rect.left;
          const py = clientY - rect.top;
          const hitR = 4.5 + 3.2 * state.markerSizeMul;
          for (let k = 0; k < markerFlat.length; k++) {
            const flat = markerFlat[k];
            const c = markerScreenPos(flat, toCanvas, t);
            if (Math.hypot(c.x - px, c.y - py) <= hitR) return flat;
          }
          return null;
        }

        function drawMarkerConnections(toCanvas, t, chains) {
          if (!chains || chains.length === 0) return;
          const hi = state.selectedChainIndex;
          ctx.save();
          ctx.lineJoin = "round";
          ctx.lineCap = "round";
          ctx.setLineDash([]);

          function strokeChain(flats, highlight) {
            const f1 = flats[0];
            const f2 = flats[1];
            const f3 = flats[2];
            const f4 = flats[3];
            const p1 = markerScreenPos(f1, toCanvas, t);
            const p2 = markerScreenPos(f2, toCanvas, t);
            const p3 = markerScreenPos(f3, toCanvas, t);
            const p4 = markerScreenPos(f4, toCanvas, t);
            ctx.lineWidth = highlight ? 2.1 : 0.72;
            ctx.strokeStyle = highlight
              ? "rgba(0, 248, 255, 0.92)"
              : "rgba(0, 225, 255, 0.32)";
            strokeMarkerChainElbows(p1, p2, p3, p4, f1, f2, f3, f4);
          }

          for (let i = 0; i < chains.length; i++) {
            if (i !== hi) strokeChain(chains[i], false);
          }
          if (hi != null && hi >= 0 && hi < chains.length) {
            strokeChain(chains[hi], true);
          }

          ctx.restore();
        }

        /**
         * Trust zone — rigid lattice vs routed “stadium” paths.
         * Standardized vocabulary: TRUST_FILLETS_PX (4 radii), TRUST_KNEE (90° orth stubs).
         * Routed links use an outer ellipse loop; the long arc avoids cutting through the infield.
         */
        const TRUST_GRID_STEP_FRAC = 0.036;
        const TRUST_FILLETS_PX = [4, 8, 14, 22];
        const TWO_PI_TRUST = Math.PI * 2;

        function trustFilletPick(idA, idB, salt) {
          const k =
            (Math.imul(idA | 0, 73856093) ^
              Math.imul(idB | 0, 19349663) ^
              Math.imul(salt | 0, 83492791)) >>>
            0;
          return TRUST_FILLETS_PX[k % TRUST_FILLETS_PX.length];
        }

        function trustShortestAngleDelta(th0, th1) {
          let d = th1 - th0;
          while (d > Math.PI) d -= TWO_PI_TRUST;
          while (d <= -Math.PI) d += TWO_PI_TRUST;
          return d;
        }

        /** Long-way sweep around ellipse (running the bend, not the infield chord). */
        function trustLongEllipseDelta(th0, th1) {
          const dShort = trustShortestAngleDelta(th0, th1);
          if (Math.abs(dShort) < 1e-10) return TWO_PI_TRUST;
          return dShort > 0 ? dShort - TWO_PI_TRUST : TWO_PI_TRUST + dShort;
        }

        function trustEllipsePoint(ell, th) {
          return {
            x: ell.cx + ell.rx * Math.cos(th),
            y: ell.cy + ell.ry * Math.sin(th),
          };
        }

        function trustNearestTheta(px, py, ell) {
          return Math.atan2((py - ell.cy) / ell.ry, (px - ell.cx) / ell.rx);
        }

        function trustClampFillet(r, segLen) {
          const m = Math.max(2.5, segLen * 0.42);
          return Math.min(r, m);
        }

        /**
         * S → 90° orth stub (one arcTo, radius from TRUST_FILLETS_PX) → long ellipse lap →
         * 90° stub → H. Only those fillet sizes; only right-angle knees on stubs.
         * `laneExpandPx` offsets the loop (outer lanes).
         */
        function strokeStadiumRouted(
          sx,
          sy,
          hx,
          hy,
          ellBase,
          idA,
          idB,
          salt,
          laneExpandPx,
        ) {
          const ell = {
            cx: ellBase.cx,
            cy: ellBase.cy,
            rx: ellBase.rx + laneExpandPx,
            ry: ellBase.ry + laneExpandPx,
          };
          const dx0 = hx - sx;
          const dy0 = hy - sy;
          const len0 = Math.hypot(dx0, dy0);
          if (len0 < 2) return;
          const nx = -dy0 / len0;
          const ny = dx0 / len0;
          sx += nx * laneExpandPx * 0.28;
          sy += ny * laneExpandPx * 0.28;
          hx += nx * laneExpandPx * 0.28;
          hy += ny * laneExpandPx * 0.28;

          const thS = trustNearestTheta(sx, sy, ell);
          const thH = trustNearestTheta(hx, hy, ell);
          const E0 = trustEllipsePoint(ell, thS);
          const E1 = trustEllipsePoint(ell, thH);
          const longD = trustLongEllipseDelta(thS, thH);
          const arcSeg = Math.max(
            32,
            Math.min(
              100,
              Math.ceil((Math.abs(longD) / TWO_PI_TRUST) * 80),
            ),
          );
          const legIn = Math.hypot(E0.x - sx, E0.y - sy);
          const legOut = Math.hypot(E1.x - hx, E1.y - hy);
          const rKneeIn = trustClampFillet(trustFilletPick(idA, idB, salt), legIn);
          const rKneeOut = trustClampFillet(
            TRUST_FILLETS_PX[(salt + 9) % TRUST_FILLETS_PX.length],
            legOut,
          );

          const horizFirst = Math.abs(E0.x - sx) >= Math.abs(E0.y - sy);
          const horizFirstOut = Math.abs(hx - E1.x) >= Math.abs(hy - E1.y);

          ctx.beginPath();
          ctx.moveTo(sx, sy);
          if (horizFirst) {
            ctx.arcTo(E0.x, sy, E0.x, E0.y, rKneeIn);
          } else {
            ctx.arcTo(sx, E0.y, E0.x, E0.y, rKneeIn);
          }
          ctx.lineTo(E0.x, E0.y);
          for (let k = 1; k <= arcSeg; k++) {
            const th = thS + longD * (k / arcSeg);
            const p = trustEllipsePoint(ell, th);
            ctx.lineTo(p.x, p.y);
          }
          if (horizFirstOut) {
            ctx.arcTo(E1.x, hy, hx, hy, rKneeOut);
          } else {
            ctx.arcTo(hx, E1.y, hx, hy, rKneeOut);
          }
          ctx.lineTo(hx, hy);
          ctx.stroke();
        }

        function trustTrackEllipseBase(coreC, chassisW, chassisH) {
          const pad = Math.max(14, Math.min(chassisW, chassisH) * 0.14);
          return {
            cx: coreC.x,
            cy: coreC.y,
            rx: chassisW * 0.58 + pad,
            ry: chassisH * 0.68 + pad,
          };
        }

        function trustCoreHubs3D() {
          const step = Math.min(AX, BY, CZ) * TRUST_GRID_STEP_FRAC;
          const out = [];
          for (let gx = -1; gx <= 1; gx++) {
            for (let gy = -1; gy <= 1; gy++) {
              for (let gz = -1; gz <= 0; gz++) {
                out.push({ x: gx * step, y: gy * step, z: gz * step });
              }
            }
          }
          return out;
        }

        function trustGridManhattan3(a, b) {
          const step = Math.min(AX, BY, CZ) * TRUST_GRID_STEP_FRAC;
          const q = step > 1e-9 ? 1 / step : 1;
          const gxa = Math.round(a.x * q);
          const gya = Math.round(a.y * q);
          const gza = Math.round(a.z * q);
          const gxb = Math.round(b.x * q);
          const gyb = Math.round(b.y * q);
          const gzb = Math.round(b.z * q);
          return (
            Math.abs(gxa - gxb) +
            Math.abs(gya - gyb) +
            Math.abs(gza - gzb)
          );
        }

        function drawTrustZoneCore(toCanvas, t) {
          if (!state.showPaths || STATIC_POINT_UV.length < 2) return;
          const hubs3 = trustCoreHubs3D();
          const hubScr = hubs3.map((p) => toCanvas(project(p, t)));
          const coreC = toCanvas(project({ x: 0, y: 0, z: 0 }, t));
          const nStatic = STATIC_POINT_UV.length;
          const staticScr = [];
          for (let i = 0; i < nStatic; i++) {
            staticScr.push(toCanvas(project(staticAnchorPoint3(i), t)));
          }

          ctx.save();
          ctx.lineJoin = "round";
          ctx.lineCap = "round";

          const maxDim = Math.max(
            canvas.clientWidth || 400,
            canvas.clientHeight || 400,
          );
          const chassisW = Math.min(maxDim * 0.1, 128);
          const chassisH = Math.min(maxDim * 0.068, 88);
          const ellBase = trustTrackEllipseBase(coreC, chassisW, chassisH);
          const rx = 3;
          const cx0 = coreC.x - chassisW * 0.5;
          const cy0 = coreC.y - chassisH * 0.5;

          /* Rack / enclosure: dark panel, cold aisle rim */
          ctx.fillStyle = "rgba(8, 14, 28, 0.78)";
          ctx.beginPath();
          if (typeof ctx.roundRect === "function") {
            ctx.roundRect(cx0, cy0, chassisW, chassisH, rx);
          } else {
            ctx.rect(cx0, cy0, chassisW, chassisH);
          }
          ctx.fill();
          ctx.strokeStyle = "rgba(0, 210, 195, 0.48)";
          ctx.lineWidth = 1.15;
          ctx.stroke();

          /* Rigid grid — cross-hatch inside chassis (tension vs flowing lanes below) */
          ctx.strokeStyle = "rgba(0, 140, 165, 0.16)";
          ctx.lineWidth = 0.65;
          ctx.lineJoin = "miter";
          ctx.lineCap = "butt";
          const nBars = 4;
          const nCols = 5;
          for (let b = 1; b < nBars; b++) {
            const yy = cy0 + (chassisH * b) / nBars;
            ctx.beginPath();
            ctx.moveTo(cx0 + 4, yy);
            ctx.lineTo(cx0 + chassisW - 4, yy);
            ctx.stroke();
          }
          for (let c = 1; c < nCols; c++) {
            const xx = cx0 + (chassisW * c) / nCols;
            ctx.beginPath();
            ctx.moveTo(xx, cy0 + 4);
            ctx.lineTo(xx, cy0 + chassisH - 4);
            ctx.stroke();
          }
          ctx.lineJoin = "round";
          ctx.lineCap = "round";

          /* Crown jewels — soft vault marker */
          const vaultR = Math.min(10, chassisW * 0.09);
          ctx.fillStyle = "rgba(255, 200, 72, 0.1)";
          ctx.strokeStyle = "rgba(255, 210, 120, 0.75)";
          ctx.lineWidth = 1.05;
          ctx.beginPath();
          if (typeof ctx.roundRect === "function") {
            ctx.roundRect(
              coreC.x - vaultR,
              coreC.y - vaultR,
              vaultR * 2,
              vaultR * 2,
              2,
            );
          } else {
            ctx.rect(coreC.x - vaultR, coreC.y - vaultR, vaultR * 2, vaultR * 2);
          }
          ctx.fill();
          ctx.stroke();
          ctx.strokeStyle = "rgba(255, 230, 160, 0.38)";
          ctx.lineWidth = 0.6;
          ctx.strokeRect(
            coreC.x - vaultR * 0.55,
            coreC.y - vaultR * 0.55,
            vaultR * 1.1,
            vaultR * 1.1,
          );

          const nh = hubScr.length;
          const centerIdx = hubs3.findIndex(
            (p) => p.x === 0 && p.y === 0 && p.z === 0,
          );
          const vaultIdx = centerIdx >= 0 ? centerIdx : 0;

          /* Blade ticks — rectilinear anchors on lattice */
          for (let hi = 0; hi < nh; hi++) {
            const H = hubScr[hi];
            const isVault = hi === vaultIdx;
            const bw = isVault ? 0 : 3.2;
            const bh = isVault ? 0 : 2.4;
            if (!isVault) {
              ctx.fillStyle = "rgba(18, 32, 52, 0.92)";
              ctx.fillRect(H.x - bw * 0.5, H.y - bh * 0.5, bw, bh);
              ctx.strokeStyle = "rgba(0, 200, 185, 0.58)";
              ctx.lineWidth = 0.75;
              ctx.strokeRect(H.x - bw * 0.5, H.y - bh * 0.5, bw, bh);
            }
          }

          /* Rigid graph: straight edges only between grid neighbors */
          ctx.lineJoin = "miter";
          ctx.lineCap = "butt";
          for (let i = 0; i < nh; i++) {
            for (let j = i + 1; j < nh; j++) {
              if (trustGridManhattan3(hubs3[i], hubs3[j]) !== 1) continue;
              const p = pairHash01(i, j, 701);
              const ax = hubScr[i].x;
              const ay = hubScr[i].y;
              const bx = hubScr[j].x;
              const by = hubScr[j].y;
              ctx.strokeStyle = `rgba(0, 195, 178, ${0.28 + p * 0.22})`;
              ctx.lineWidth = 0.88 + p * 0.35;
              ctx.setLineDash([]);
              ctx.beginPath();
              ctx.moveTo(ax, ay);
              ctx.lineTo(bx, by);
              ctx.stroke();
              if (pairHash01(i, j, 702) > 0.52) {
                ctx.strokeStyle = `rgba(100, 255, 230, ${0.1 + p * 0.08})`;
                ctx.lineWidth = 0.4;
                ctx.setLineDash([3, 4]);
                ctx.beginPath();
                ctx.moveTo(ax, ay);
                ctx.lineTo(bx, by);
                ctx.stroke();
                ctx.setLineDash([]);
              }
            }
          }
          ctx.lineJoin = "round";
          ctx.lineCap = "round";

          /* Static ↔ static — outer-lap routing only (long ellipse), standardized fillets */
          for (let i = 0; i < nStatic; i++) {
            for (let j = i + 1; j < nStatic; j++) {
              if (pairHash01(i, j, 1203) > 0.52) continue;
              const w = pairHash01(i, j, 1205);
              ctx.strokeStyle = `rgba(100, 220, 255, ${0.11 + w * 0.12})`;
              ctx.lineWidth = 0.48 + w * 0.28;
              ctx.setLineDash([]);
              strokeStadiumRouted(
                staticScr[i].x,
                staticScr[i].y,
                staticScr[j].x,
                staticScr[j].y,
                ellBase,
                i + 3000,
                j + 3000,
                1400 + i * 41 + j,
                0,
              );
            }
          }

          /* Uplinks: dual outer lanes + center ghost — same stadium vocabulary */
          const lane = 2.4;
          for (let si = 0; si < nStatic; si++) {
            const S = staticScr[si];
            for (let hi = 0; hi < nh; hi++) {
              const pick =
                pairHash01(si + 11, hi + 3, 902) > 0.38 ||
                (si + hi) % 3 === 0;
              if (!pick) continue;
              const H = hubScr[hi];
              const w = pairHash01(si, hi, 910);
              ctx.strokeStyle = `rgba(0, 225, 205, ${0.38 + w * 0.26})`;
              ctx.lineWidth = 0.92 + w * 0.42;
              ctx.setLineDash([]);
              strokeStadiumRouted(
                S.x,
                S.y,
                H.x,
                H.y,
                ellBase,
                si + 2000,
                hi + 5000,
                1200 + si * 17 + hi,
                -lane,
              );
              strokeStadiumRouted(
                S.x,
                S.y,
                H.x,
                H.y,
                ellBase,
                si + 2050,
                hi + 5050,
                1250 + si * 19 + hi,
                lane,
              );
              ctx.strokeStyle = `rgba(160, 255, 240, ${0.12 + w * 0.1})`;
              ctx.lineWidth = 0.36;
              ctx.setLineDash([4, 5]);
              strokeStadiumRouted(
                S.x,
                S.y,
                H.x,
                H.y,
                ellBase,
                si + 2100,
                hi + 5100,
                1300 + si * 23 + hi,
                0,
              );
              ctx.setLineDash([]);
            }
          }

          ctx.restore();
        }

        function drawFixedPaths(toCanvas, t) {
          if (!state.showPaths || STATIC_POINT_UV.length < 2) return;
          const pts = [];
          for (let i = 0; i < STATIC_POINT_UV.length; i++) {
            pts.push(toCanvas(project(staticAnchorPoint3(i), t)));
          }
          const n = pts.length;
          const tang = new Array(n);
          const rot = (state.pathExtendMul * Math.PI) / 180;
          const cr = Math.cos(rot);
          const sr = Math.sin(rot);
          const orbR = 6.2 * state.pathHandleMul;
          const inPts = new Array(n);
          const outPts = new Array(n);
          for (let i = 0; i < n; i++) {
            const prev =
              i > 0
                ? pts[i - 1]
                : {
                    x: pts[0].x - (pts[1].x - pts[0].x),
                    y: pts[0].y - (pts[1].y - pts[0].y),
                  };
            const next =
              i < n - 1
                ? pts[i + 1]
                : {
                    x: pts[n - 1].x + (pts[n - 1].x - pts[n - 2].x),
                    y: pts[n - 1].y + (pts[n - 1].y - pts[n - 2].y),
                  };
            const dx = next.x - prev.x;
            const dy = next.y - prev.y;
            const m = Math.hypot(dx, dy) || 1;
            const tx = dx / m;
            const ty = dy / m;
            tang[i] = {
              x: tx * cr - ty * sr,
              y: tx * sr + ty * cr,
            };
            inPts[i] = {
              x: pts[i].x - tang[i].x * orbR,
              y: pts[i].y - tang[i].y * orbR,
            };
            outPts[i] = {
              x: pts[i].x + tang[i].x * orbR,
              y: pts[i].y + tang[i].y * orbR,
            };
          }
          ctx.save();
          ctx.lineJoin = "round";
          ctx.lineCap = "round";
          ctx.setLineDash([]);
          ctx.lineWidth = 0.48;
          ctx.strokeStyle = "rgba(0, 225, 255, 0.22)";
          if (state.pathThroughPoints) {
            ctx.beginPath();
            ctx.moveTo(inPts[0].x, inPts[0].y);
            for (let i = 0; i < n; i++) {
              ctx.lineTo(pts[i].x, pts[i].y);
              ctx.lineTo(outPts[i].x, outPts[i].y);
              if (i < n - 1) {
                if (state.pathFilletMul <= 0) {
                  ctx.lineTo(inPts[i + 1].x, inPts[i + 1].y);
                } else {
                  const dx = inPts[i + 1].x - outPts[i].x;
                  const dy = inPts[i + 1].y - outPts[i].y;
                  const d = Math.hypot(dx, dy);
                  const nx = d > 1e-6 ? -dy / d : 0;
                  const ny = d > 1e-6 ? dx / d : 0;
                  const kx =
                    (outPts[i].x + inPts[i + 1].x) * 0.5 +
                    nx * d * 0.03 * state.pathFilletMul;
                  const ky =
                    (outPts[i].y + inPts[i + 1].y) * 0.5 +
                    ny * d * 0.03 * state.pathFilletMul;
                  ctx.quadraticCurveTo(kx, ky, inPts[i + 1].x, inPts[i + 1].y);
                }
              }
            }
            ctx.stroke();
          } else {
            ctx.beginPath();
            ctx.moveTo(pts[0].x, pts[0].y);
            for (let i = 0; i < n - 1; i++) {
              const P = pts[i];
              const Q = pts[i + 1];
              const segLen = Math.hypot(Q.x - P.x, Q.y - P.y);
              const h = segLen * 0.18 * state.pathHandleMul;
              const cp1 = { x: P.x + tang[i].x * h, y: P.y + tang[i].y * h };
              const cp2 = {
                x: Q.x - tang[i + 1].x * h,
                y: Q.y - tang[i + 1].y * h,
              };
              ctx.bezierCurveTo(cp1.x, cp1.y, cp2.x, cp2.y, Q.x, Q.y);
            }
            ctx.stroke();
          }
          ctx.restore();
        }

        function drawStaticVolumePoints(toCanvas, t) {
          if (!state.showStaticVolumePoints) return;
          ctx.save();
          ctx.lineJoin = "round";
          ctx.lineCap = "round";
          for (let i = 0; i < STATIC_POINT_UV.length; i++) {
            const c = toCanvas(project(staticAnchorPoint3(i), t));
            ctx.beginPath();
            ctx.arc(c.x, c.y, 3.4, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(255, 130, 70, 0.92)";
            ctx.fill();
            ctx.strokeStyle = "rgba(0, 210, 255, 0.55)";
            ctx.lineWidth = 1.1;
            ctx.stroke();
          }
          ctx.restore();
        }

        function drawVertexMarkers(toCanvas, t) {
          const n = markerFlat.length;
          if (n === 0) return;
          const sel = state.selectedMarkerFlat;
          const rBase = 2.1 * state.markerSizeMul;
          const rSel = 2.65 * state.markerSizeMul;
          const rRing = 5.2 * state.markerSizeMul;
          for (let k = 0; k < n; k++) {
            const flat = markerFlat[k];
            const c = markerScreenPos(flat, toCanvas, t);
            const isSel = sel !== null && flat === sel;
            if (isSel) {
              ctx.beginPath();
              ctx.arc(c.x, c.y, rRing, 0, Math.PI * 2);
              ctx.strokeStyle = "rgba(0, 210, 255, 0.88)";
              ctx.lineWidth = Math.max(1.2, 1.6 * state.markerSizeMul * 0.7);
              ctx.stroke();
            }
            ctx.beginPath();
            ctx.arc(c.x, c.y, isSel ? rSel : rBase, 0, Math.PI * 2);
            ctx.fillStyle = isSel ? "rgba(255, 255, 255, 1)" : "rgba(255, 255, 255, 0.95)";
            ctx.fill();
          }
        }

        /** Integer-aligned grid: 12 × 5 × 5 cells in [-HALF, +HALF] per axis. */
        function drawVolumeGrid(toCanvas, t) {
          const xCoords = [];
          for (let i = 0; i <= TILE_X; i++) xCoords.push(-HALF_X + i);
          const yCoords = [];
          for (let j = 0; j <= TILE_Y; j++) yCoords.push(-HALF_Y + j);
          const zCoords = [];
          for (let k = 0; k <= TILE_Z; k++) zCoords.push(-HALF_Z + k);

          ctx.beginPath();

          for (let yi = 0; yi < yCoords.length; yi++) {
            for (let zi = 0; zi < zCoords.length; zi++) {
              const y = yCoords[yi];
              const z = zCoords[zi];
              const p0 = toCanvas(project({ x: -HALF_X, y, z }, t));
              const p1 = toCanvas(project({ x: HALF_X, y, z }, t));
              ctx.moveTo(p0.x, p0.y);
              ctx.lineTo(p1.x, p1.y);
            }
          }

          for (let xi = 0; xi < xCoords.length; xi++) {
            for (let zi = 0; zi < zCoords.length; zi++) {
              const x = xCoords[xi];
              const z = zCoords[zi];
              const p0 = toCanvas(project({ x, y: -HALF_Y, z }, t));
              const p1 = toCanvas(project({ x, y: HALF_Y, z }, t));
              ctx.moveTo(p0.x, p0.y);
              ctx.lineTo(p1.x, p1.y);
            }
          }

          for (let xi = 0; xi < xCoords.length; xi++) {
            for (let yi = 0; yi < yCoords.length; yi++) {
              const x = xCoords[xi];
              const y = yCoords[yi];
              const p0 = toCanvas(project({ x, y, z: -HALF_Z }, t));
              const p1 = toCanvas(project({ x, y, z: HALF_Z }, t));
              ctx.moveTo(p0.x, p0.y);
              ctx.lineTo(p1.x, p1.y);
            }
          }

          ctx.stroke();
        }

        /** Smooth panel point inset from mesh shell — follows slide when active. */
        function panelSurfacePoint(u, v) {
          const p = ellipsoidSurfacePoint(u, v);
          const s = 1 - PANEL_INSET_FRAC;
          return { x: p.x * s, y: p.y * s, z: p.z * s };
        }

        /**
         * Volleyball / soccer-inspired seams: curved meridional strips + parabolic latitude-like bands.
         * All curves live on (u,v) then map onto the ellipsoid.
         */
        /** 0 = viewport center, ~1 toward edges — stroke weight bias for panel links. */
        function screenCenterBias01Panel(px, py, cw, ch) {
          const cx = cw * 0.5;
          const cy = ch * 0.5;
          const scale = Math.max(cw, ch) * 0.52;
          const nx = (px - cx) / scale;
          const ny = (py - cy) / scale;
          return Math.min(1, Math.hypot(nx, ny));
        }

        function drawBallPanels(toCanvas, tr, cw, ch) {
          const STEPS = 56;
          const PI = Math.PI;
          const TAU = 2 * PI;
          const nSeam = panelSeamCountFromTightness();
          const ns = Math.max(1, nSeam);
          const jitter = Math.max(0, Math.min(1, state.panelWrapJitter / 100));
          const uniformBias = state.panelUniformWrap ? 0.34 : 1;
          const jm = jitter * uniformBias;
          const panelCurves = [];

          function strokeCurve(getUV) {
            let first = true;
            for (let s = 0; s <= STEPS; s++) {
              const t = s / STEPS;
              const uv = getUV(t);
              const c = toCanvas(project(panelSurfacePoint(uv.u, uv.v), tr));
              if (first) {
                ctx.moveTo(c.x, c.y);
                first = false;
              } else {
                ctx.lineTo(c.x, c.y);
              }
            }
          }

          function markPanelCurve(getUV) {
            const divs = panelDotDivisionsFromDensity();
            if (divs <= 1) return;
            const r = Math.max(0.42, 1.28 - divs / 700);
            for (let m = 1; m < divs; m++) {
              const tt = m / divs;
              const uv = getUV(tt);
              const c = toCanvas(project(panelSurfacePoint(uv.u, uv.v), tr));
              ctx.beginPath();
              ctx.arc(c.x, c.y, r, 0, Math.PI * 2);
              ctx.fill();
            }
          }

          /* Longitudinal seams (volleyball-style strips), parabolic / wavy in v */
          for (let k = 0; k < nSeam; k++) {
            const vBase = k * (TAU / nSeam);
            const ha = hashPanel(k, 41);
            const hb = hashPanel(k, 43);
            const hd = hashPanel(k, 53);
            panelCurves.push(function (t) {
              const u = PI * (2 * t - t * t);
              const par =
                (hd - 0.5) * 0.55 * jm * (t - 0.5) * (t - 0.5) * 4;
              const v =
                vBase +
                0.34 * Math.sin(PI * t) +
                (ha - 0.5) * 0.4 * jm * Math.sin(3 * PI * t) +
                (hb - 0.5) * 0.24 * jm * Math.sin(5 * PI * t) +
                par;
              return { u: u, v: wrapV(v) };
            });
          }

          /* Transverse bands: u(v) with parabolic + harmonic variation (soccer-like arcs) */
          for (let k = 0; k < nSeam; k++) {
            const uMid =
              (PI / (nSeam + 1)) * (k + 1) + (hashPanel(k, 61) - 0.5) * 0.09 * jm;
            const ha = hashPanel(k, 67);
            const hb = hashPanel(k, 71);
            const hp = hashPanel(k, 73);
            panelCurves.push(function (t) {
              const v = TAU * t;
              const vm = (v - PI) / PI;
              const u =
                uMid +
                (ha - 0.5) * 0.4 * jm * Math.sin(2 * v) +
                (hb - 0.5) * 0.2 * jm * Math.cos(3 * v) +
                (hp - 0.5) * 0.38 * jm * vm * vm;
              return {
                u: Math.max(U_EPS, Math.min(PI - U_EPS, u)),
                v: wrapV(v),
              };
            });
          }

          /* Diagonal “panel” cuts: quadratic blend in (u,v) for varied parabolic legs */
          for (let k = 0; k < nSeam; k++) {
            const g = hashPanel(k, 79);
            const h0 = hashPanel(k, 83);
            const h1 = hashPanel(k, 89);
            const u0 = 0.12 * PI + (k / ns) * 0.35 * PI;
            const u2 = PI - 0.1 * PI - (k / (ns + 2)) * 0.25 * PI;
            const v0 = k * (TAU / nSeam) + (g - 0.5) * 0.8 * jm;
            const v2 = wrapV(v0 + TAU / 3 + (h0 - 0.5) * 0.5 * jm);
            const u1 = (u0 + u2) * 0.5 + (h1 - 0.5) * 0.45 * PI * jm;
            const v1 = wrapV((v0 + v2) * 0.5 + (hashPanel(k, 97) - 0.5) * 0.9 * jm);
            panelCurves.push(function (t) {
              const omt = 1 - t;
              const u = omt * omt * u0 + 2 * omt * t * u1 + t * t * u2;
              let vv = omt * omt * v0 + 2 * omt * t * v1 + t * t * v2;
              vv = wrapV(vv);
              return {
                u: Math.max(U_EPS, Math.min(PI - U_EPS, u)),
                v: vv,
              };
            });
          }

          if (state.showPanelSeams) {
            const dashPct = Math.max(0, Math.min(100, state.panelLineDash | 0));
            ctx.beginPath();
            ctx.lineWidth = 1.08;
            ctx.lineJoin = "round";
            ctx.lineCap = "round";
            ctx.strokeStyle = "rgba(240, 248, 255, 0.38)";
            if (dashPct <= 0) {
              ctx.setLineDash([]);
            } else {
              const d = 0.75 + (dashPct / 100) * 9.25;
              ctx.setLineDash([d, d * 1.06]);
            }
            for (let i = 0; i < panelCurves.length; i++) {
              strokeCurve(panelCurves[i]);
            }
            ctx.stroke();
            ctx.setLineDash([]);
          }

          if (state.showPanelDots) {
            const divsRay = panelDotDivisionsFromDensity();
            if (divsRay > 1) {
              const seamS = state.panelSeamSeed | 0;
              const curl = 0.48;
              const skip = Math.max(0, Math.min(12, state.panelLinkSkip | 0));
              const nodes = [];
              for (let ci = 0; ci < panelCurves.length; ci++) {
                const getUV = panelCurves[ci];
                for (let m = 1; m < divsRay; m++) {
                  const tt = m / divsRay;
                  const uv = getUV(tt);
                  const P3 = panelSurfacePoint(uv.u, uv.v);
                  const E3 = {
                    x: P3.x * 0.9,
                    y: P3.y * 0.9,
                    z: P3.z * 0.9,
                  };
                  const s = toCanvas(project(P3, tr));
                  const e = toCanvas(project(E3, tr));
                  nodes.push({
                    id: ci * 1000000 + m,
                    ci: ci,
                    m: m,
                    sx: s.x,
                    sy: s.y,
                    ex: e.x,
                    ey: e.y,
                    isMarker: false,
                  });
                }
              }
              const panelNodeCount = nodes.length;

              function linkXY(n) {
                return { x: n.ex, y: n.ey };
              }

              const staticScreen = [];
              for (let sk = 0; sk < STATIC_POINT_UV.length; sk++) {
                staticScreen.push(
                  toCanvas(project(staticAnchorPoint3(sk), tr)),
                );
              }

              ctx.save();
              ctx.lineCap = "round";
              ctx.lineJoin = "round";
              ctx.setLineDash([]);
              ctx.strokeStyle = "rgba(160, 210, 255, 0.42)";
              ctx.lineWidth = 0.5;
              for (let i = 0; i < panelNodeCount; i++) {
                const n = nodes[i];
                ctx.beginPath();
                ctx.moveTo(n.sx, n.sy);
                ctx.lineTo(n.ex, n.ey);
                ctx.stroke();
              }

              for (let i = 0; i < panelNodeCount; i++) {
                const na = nodes[i];
                const pA = linkXY(na);
                let sk = 0;
                let bestSd = Infinity;
                for (let k = 0; k < staticScreen.length; k++) {
                  const sx = staticScreen[k].x;
                  const sy = staticScreen[k].y;
                  const dx = pA.x - sx;
                  const dy = pA.y - sy;
                  const d = dx * dx + dy * dy;
                  if (d < bestSd) {
                    bestSd = d;
                    sk = k;
                  }
                }
                const S = staticScreen[sk];

                let bestJ = -1;
                let bestD = Infinity;
                for (let j = 0; j < panelNodeCount; j++) {
                  if (j === i) continue;
                  const nb = nodes[j];
                  if (
                    !panelLinkAllowedSameSeam(na.ci, na.m, nb.ci, nb.m, skip)
                  ) {
                    continue;
                  }
                  const pB = linkXY(nb);
                  const dx = pA.x - pB.x;
                  const dy = pA.y - pB.y;
                  const d = dx * dx + dy * dy;
                  if (d < bestD) {
                    bestD = d;
                    bestJ = j;
                  }
                }

                const nd1 = screenCenterBias01Panel(
                  (pA.x + S.x) * 0.5,
                  (pA.y + S.y) * 0.5,
                  cw,
                  ch,
                );
                const baseA1 = 0.2 + 0.18 * (1 - nd1);
                ctx.strokeStyle = "rgba(210, 240, 255, " + baseA1 + ")";
                ctx.lineWidth = 0.32 + 0.2 * (1 - nd1);
                const rex = na.ex - na.sx;
                const rey = na.ey - na.sy;
                const rayLen = Math.hypot(rex, rey);
                let vrx = 1;
                let vry = 0;
                if (rayLen > 1e-6) {
                  vrx = rex / rayLen;
                  vry = rey / rayLen;
                }
                const chordAS = Math.hypot(pA.x - S.x, pA.y - S.y);
                const stub1 = Math.min(
                  0.14 * chordAS,
                  0.28 * rayLen,
                  40,
                );
                const j1x = pA.x + vrx * stub1;
                const j1y = pA.y + vry * stub1;
                if (stub1 > 1.2) {
                  ctx.beginPath();
                  ctx.moveTo(pA.x, pA.y);
                  ctx.lineTo(j1x, j1y);
                  ctx.stroke();
                }
                strokeConnectionWideBezierTangentStart(
                  j1x,
                  j1y,
                  S.x,
                  S.y,
                  vrx,
                  vry,
                  curl * 0.85,
                  na.id,
                  sk + 910000,
                  seamS,
                  0.22,
                );

                if (bestJ < 0 || bestD < 1e-8) continue;
                const b = nodes[bestJ];
                if (na.id >= b.id) continue;
                const pB = linkXY(b);
                const nd2 = screenCenterBias01Panel(
                  (S.x + pB.x) * 0.5,
                  (S.y + pB.y) * 0.5,
                  cw,
                  ch,
                );
                const baseA2 = 0.2 + 0.18 * (1 - nd2);
                ctx.strokeStyle = "rgba(210, 240, 255, " + baseA2 + ")";
                ctx.lineWidth = 0.32 + 0.2 * (1 - nd2);
                const sdx = pB.x - S.x;
                const sdy = pB.y - S.y;
                const sdl = Math.hypot(sdx, sdy);
                let vtx = 1;
                let vty = 0;
                if (sdl > 1e-6) {
                  vtx = sdx / sdl;
                  vty = sdy / sdl;
                }
                const chordSB = sdl;
                const stub2 = Math.min(0.1 * chordSB, 36);
                const j2x = S.x + vtx * stub2;
                const j2y = S.y + vty * stub2;
                if (stub2 > 1.2) {
                  ctx.beginPath();
                  ctx.moveTo(S.x, S.y);
                  ctx.lineTo(j2x, j2y);
                  ctx.stroke();
                }
                strokeConnectionWideBezierTangentStart(
                  j2x,
                  j2y,
                  pB.x,
                  pB.y,
                  vtx,
                  vty,
                  curl * 0.85,
                  sk + 920000,
                  b.id,
                  seamS + 3,
                  0.2,
                );
              }
              ctx.restore();
            }
            ctx.fillStyle = "rgba(255, 255, 255, 0.78)";
            for (let i = 0; i < panelCurves.length; i++) {
              markPanelCurve(panelCurves[i]);
            }
          }

          ctx.lineWidth = 1;
        }

        function canvasCssSize() {
          const cw = canvas.clientWidth;
          const ch = canvas.clientHeight;
          return { cw: cw > 0 ? cw : 1, ch: ch > 0 ? ch : 1 };
        }

        function frame() {
          const { cw, ch } = canvasCssSize();
          ctx.clearRect(0, 0, cw, ch);

          const t = trig();
          const b = boundsScene(t);
          const toCanvas = makeToCanvas(cw, ch, b);

          ctx.lineWidth = 1;
          ctx.lineJoin = "round";
          ctx.lineCap = "round";

          if (state.showSolidGeometry) {
            if (state.showVolume) {
              ctx.strokeStyle = "rgba(0, 210, 255, 0.22)";
              drawVolumeGrid(toCanvas, t);
            } else {
              drawEllipsoidSolidGeometry(toCanvas, t);
            }
          }

          if (state.showPanelSeams || state.showPanelDots) {
            drawBallPanels(toCanvas, t, cw, ch);
          }

          if (state.showMesh) {
            drawEllipsoidWireframe(toCanvas, t);
          }

          if (state.showPaths) {
            drawTrustZoneCore(toCanvas, t);
            drawFixedPaths(toCanvas, t);
          }

          if (state.showStaticVolumePoints) {
            drawStaticVolumePoints(toCanvas, t);
          }

          if (state.showMarkers && markerFlat.length > 0) {
            drawVertexMarkers(toCanvas, t);
          }
        }

        function resize() {
          const { cw, ch } = canvasCssSize();
          const dpr = Math.min(window.devicePixelRatio || 1, 2);
          const w = Math.max(1, Math.floor(cw * dpr));
          const h = Math.max(1, Math.floor(ch * dpr));
          canvas.width = w;
          canvas.height = h;
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          frame();
        }

        function onPointerDown(e) {
          closeAllPopovers();
          if (e.button !== 0) return;
          const ttr = trig();
          const b = boundsScene(ttr);
          const { cw, ch } = canvasCssSize();
          const toCanvas = makeToCanvas(cw, ch, b);
          const hitFlat =
            state.showMarkers && markerFlat.length > 0
              ? pickMarkerAtCanvas(e.clientX, e.clientY, toCanvas, ttr)
              : null;
          if (hitFlat != null) {
            state.selectedMarkerFlat = hitFlat;
            const chains =
              markerFlat.length >= 4 ? buildMarkerChainsProximity(ttr) : [];
            state.selectedChainIndex = findChainIndexForFlat(hitFlat, chains);
            frame();
            return;
          }
          state.selectedMarkerFlat = null;
          state.selectedChainIndex = null;
          state.dragging = true;
          state.ptrId = e.pointerId;
          state.lastX = e.clientX;
          state.lastY = e.clientY;
          canvas.classList.add("is-dragging");
          canvas.setPointerCapture(e.pointerId);
        }

        function onPointerMove(e) {
          if (!state.dragging || e.pointerId !== state.ptrId) return;
          const dx = e.clientX - state.lastX;
          const dy = e.clientY - state.lastY;
          state.lastX = e.clientX;
          state.lastY = e.clientY;
          state.yaw += dx * ROT_SENS;
          state.pitch += dy * ROT_SENS;
          if (state.pitch < PITCH_MIN) state.pitch = PITCH_MIN;
          if (state.pitch > PITCH_MAX) state.pitch = PITCH_MAX;
          frame();
        }

        function onPointerUp(e) {
          if (e.pointerId !== state.ptrId) return;
          state.dragging = false;
          state.ptrId = null;
          canvas.classList.remove("is-dragging");
          try {
            canvas.releasePointerCapture(e.pointerId);
          } catch (_) {}
        }

        function onWheel(e) {
          e.preventDefault();
          let z = state.zoom * Math.exp(-e.deltaY * ZOOM_SENS);
          if (z < ZOOM_MIN) z = ZOOM_MIN;
          if (z > ZOOM_MAX) z = ZOOM_MAX;
          state.zoom = z;
          frame();
        }

        function updateVolumeButtonLabel() {
          btnVolume.textContent = state.showVolume ? "Solid: 12×5×5" : "Solid: Ellipsoid";
          btnVolume.title = state.showVolume
            ? "Solid mode is 12×5×5 volume"
            : "Solid mode is ellipsoid";
        }

        function syncVolumeControlsFromState() {
          solidModeVolume.checked = state.showVolume;
          solidModeEllipsoid.checked = !state.showVolume;
          chkSolidGeometry.checked = state.showSolidGeometry;
          updateVolumeButtonLabel();
        }

        function closeAllPopovers() {
          state.openPopover = null;
          syncPopoverChrome();
        }

        function togglePopover(key) {
          state.openPopover = state.openPopover === key ? null : key;
          syncPopoverChrome();
        }

        function syncPopoverChrome() {
          const open = state.openPopover;
          toolAxisSlide.classList.toggle("chrome-tool--open", open === "axis-slide");
          btnAxisSlide.setAttribute("aria-expanded", open === "axis-slide" ? "true" : "false");
          toolPanels.classList.toggle("chrome-tool--open", open === "panels");
          btnPanels.setAttribute("aria-expanded", open === "panels" ? "true" : "false");
          toolVolume.classList.toggle("chrome-tool--open", open === "volume");
          btnVolume.setAttribute("aria-expanded", open === "volume" ? "true" : "false");
          toolMesh.classList.toggle("chrome-tool--open", open === "mesh");
          btnMesh.setAttribute("aria-expanded", open === "mesh" ? "true" : "false");
          toolMarkers.classList.toggle("chrome-tool--open", open === "markers");
          btnMarkers.setAttribute("aria-expanded", open === "markers" ? "true" : "false");
          toolPaths.classList.toggle("chrome-tool--open", open === "paths");
          btnPaths.setAttribute("aria-expanded", open === "paths" ? "true" : "false");
        }

        function syncChromePressedButtons() {
          const anyPanel = state.showPanelSeams || state.showPanelDots;
          btnPanels.classList.toggle("is-active", anyPanel);
          btnPanels.setAttribute("aria-pressed", anyPanel ? "true" : "false");
          btnMesh.classList.toggle("is-active", state.showMesh);
          btnMesh.setAttribute("aria-pressed", state.showMesh ? "true" : "false");
          btnMarkers.classList.toggle("is-active", state.showMarkers);
          btnMarkers.setAttribute("aria-pressed", state.showMarkers ? "true" : "false");
          btnPaths.classList.toggle("is-active", state.showPaths);
          btnPaths.setAttribute("aria-pressed", state.showPaths ? "true" : "false");
          btnVolume.classList.toggle("is-active", state.showSolidGeometry);
          btnVolume.setAttribute("aria-pressed", state.showSolidGeometry ? "true" : "false");
          btnAxisSlide.classList.toggle("is-active", state.axisSlideAnim);
          btnAxisSlide.setAttribute("aria-pressed", state.axisSlideAnim ? "true" : "false");
        }

        function updatePanelControlsDisabled() {
          const panelOn = state.showPanelSeams || state.showPanelDots;
          chkPanelUniform.disabled = !panelOn;
          panelWrapJitterInput.disabled = !panelOn;
          panelTightnessInput.disabled = !panelOn;
          panelLineDashInput.disabled = !state.showPanelSeams;
          panelDotDensityInput.disabled = !state.showPanelDots;
          panelSeamSeedInput.disabled = !panelOn;
          panelLinkSkipInput.disabled = !state.showPanelDots;
          btnPanelSeamReseed.disabled = !panelOn;
        }

        function updateMeshControlsDisabled() {
          const m = state.showMesh;
          meshOpacityInput.disabled = !m;
          irregularSeedInput.disabled = !m;
          irregularScaleInput.disabled = !m;
        }

        function updateMarkerControlsDisabled() {
          markerCountInput.disabled = !state.showMarkers;
          markerSizeInput.disabled = !state.showMarkers;
          pathFilletInput.disabled = !state.showPaths;
          pathHandleInput.disabled = !state.showPaths;
          pathExtendInput.disabled = !state.showPaths;
        }

        function syncPanelTogglesFromState() {
          chkPanelSeams.checked = state.showPanelSeams;
          chkPanelDots.checked = state.showPanelDots;
          chkPanelUniform.checked = state.panelUniformWrap;
          updatePanelControlsDisabled();
        }

        btnVolume.addEventListener("click", function (ev) {
          ev.stopPropagation();
          togglePopover("volume");
        });

        btnAxisSlide.addEventListener("click", function (ev) {
          ev.stopPropagation();
          togglePopover("axis-slide");
        });

        btnPanels.addEventListener("click", function (ev) {
          ev.stopPropagation();
          togglePopover("panels");
        });

        btnMesh.addEventListener("click", function (ev) {
          ev.stopPropagation();
          togglePopover("mesh");
        });

        btnMarkers.addEventListener("click", function (ev) {
          ev.stopPropagation();
          togglePopover("markers");
        });

        btnPaths.addEventListener("click", function (ev) {
          ev.stopPropagation();
          togglePopover("paths");
        });

        chkAxisSlideAnim.addEventListener("change", function () {
          setAxisSlideAnim(chkAxisSlideAnim.checked);
        });

        chkPanelSeams.addEventListener("change", function () {
          state.showPanelSeams = chkPanelSeams.checked;
          syncChromePressedButtons();
          updatePanelControlsDisabled();
          frame();
        });

        chkPanelDots.addEventListener("change", function () {
          state.showPanelDots = chkPanelDots.checked;
          syncChromePressedButtons();
          updatePanelControlsDisabled();
          frame();
        });

        chkPanelUniform.addEventListener("change", function () {
          readPanelControlsFromInputs();
          frame();
        });

        chkMeshShow.addEventListener("change", function () {
          state.showMesh = chkMeshShow.checked;
          syncChromePressedButtons();
          updateMeshControlsDisabled();
          frame();
        });

        chkMarkersShow.addEventListener("change", function () {
          state.showMarkers = chkMarkersShow.checked;
          syncChromePressedButtons();
          updateMarkerControlsDisabled();
          frame();
        });

        solidModeEllipsoid.addEventListener("change", function () {
          if (!solidModeEllipsoid.checked) return;
          state.showVolume = false;
          syncVolumeControlsFromState();
          frame();
        });

        solidModeVolume.addEventListener("change", function () {
          if (!solidModeVolume.checked) return;
          state.showVolume = true;
          syncVolumeControlsFromState();
          frame();
        });

        chkSolidGeometry.addEventListener("change", function () {
          state.showSolidGeometry = chkSolidGeometry.checked;
          syncChromePressedButtons();
          syncVolumeControlsFromState();
          frame();
        });

        chkPathsShow.addEventListener("change", function () {
          state.showPaths = chkPathsShow.checked;
          syncChromePressedButtons();
          updateMarkerControlsDisabled();
          frame();
        });

        chkStaticVolumePoints.addEventListener("change", function () {
          state.showStaticVolumePoints = chkStaticVolumePoints.checked;
          frame();
        });

        chkPathThrough.addEventListener("change", function () {
          state.pathThroughPoints = chkPathThrough.checked;
          frame();
        });

        function readPanelControlsFromInputs() {
          state.panelTightness = Number(panelTightnessInput.value);
          panelTightnessVal.textContent = String(state.panelTightness);
          state.panelUniformWrap = chkPanelUniform.checked;
          state.panelWrapJitter = Number(panelWrapJitterInput.value);
          panelWrapJitterVal.textContent = Math.round(state.panelWrapJitter) + "%";
          state.panelDotDensity = Number(panelDotDensityInput.value);
          panelDotVal.textContent = String(state.panelDotDensity);
          state.panelSeamSeed = Number(panelSeamSeedInput.value);
          panelSeamSeedVal.textContent = String(state.panelSeamSeed);
          state.panelLinkSkip = Number(panelLinkSkipInput.value);
          panelLinkSkipVal.textContent = String(state.panelLinkSkip);
          state.panelLineDash = Number(panelLineDashInput.value);
          panelLineVal.textContent =
            state.panelLineDash <= 0 ? "solid" : String(state.panelLineDash);
        }

        function reseedPanelSeams() {
          state.panelSeamSeed = Math.floor(Math.random() * 2001);
          panelSeamSeedInput.value = String(state.panelSeamSeed);
          panelSeamSeedVal.textContent = String(state.panelSeamSeed);
          frame();
        }

        function readMeshOpacityFromInput() {
          const pct = Number(meshOpacityInput.value);
          state.meshOpacity = Math.max(0.08, Math.min(1, pct / 100));
          meshOpacityVal.textContent = Math.round(pct) + "%";
        }

        function readMarkerCountFromInput() {
          state.markerCount = Number(markerCountInput.value);
          markerCountVal.textContent = String(state.markerCount);
          rebuildMarkers();
        }

        function readMarkerSizeFromInput() {
          const pct = Number(markerSizeInput.value);
          state.markerSizeMul = Math.max(0.5, Math.min(5, pct / 100));
          markerSizeVal.textContent = state.markerSizeMul.toFixed(2) + "x";
        }

        function readPathfinderControlsFromInputs() {
          const filletPct = Number(pathFilletInput.value);
          state.pathFilletMul = Math.max(0, Math.min(5, filletPct / 100));
          pathFilletVal.textContent = state.pathFilletMul.toFixed(2) + "x";
          const handlePct = Number(pathHandleInput.value);
          state.pathHandleMul = Math.max(0, Math.min(2.6, handlePct / 100));
          pathHandleVal.textContent = state.pathHandleMul.toFixed(2) + "x";
          const rotDeg = Number(pathExtendInput.value);
          state.pathExtendMul = Math.max(0, Math.min(360, rotDeg));
          pathExtendVal.textContent = Math.round(state.pathExtendMul) + "°";
        }

        panelTightnessInput.addEventListener("input", function () {
          readPanelControlsFromInputs();
          frame();
        });

        panelWrapJitterInput.addEventListener("input", function () {
          readPanelControlsFromInputs();
          frame();
        });

        panelDotDensityInput.addEventListener("input", function () {
          readPanelControlsFromInputs();
          frame();
        });

        panelSeamSeedInput.addEventListener("input", function () {
          readPanelControlsFromInputs();
          frame();
        });

        panelLinkSkipInput.addEventListener("input", function () {
          readPanelControlsFromInputs();
          frame();
        });

        btnPanelSeamReseed.addEventListener("click", function (ev) {
          ev.stopPropagation();
          reseedPanelSeams();
        });

        panelLineDashInput.addEventListener("input", function () {
          readPanelControlsFromInputs();
          frame();
        });

        meshOpacityInput.addEventListener("input", function () {
          readMeshOpacityFromInput();
          frame();
        });

        markerCountInput.addEventListener("input", function () {
          readMarkerCountFromInput();
          frame();
        });
        markerSizeInput.addEventListener("input", function () {
          readMarkerSizeFromInput();
          frame();
        });
        pathFilletInput.addEventListener("input", function () {
          readPathfinderControlsFromInputs();
          frame();
        });
        pathHandleInput.addEventListener("input", function () {
          readPathfinderControlsFromInputs();
          frame();
        });
        pathExtendInput.addEventListener("input", function () {
          readPathfinderControlsFromInputs();
          frame();
        });

        btnReset.addEventListener("click", function () {
          closeAllPopovers();
          state.yaw = VIEW_FRONT_YAW;
          state.pitch = VIEW_FRONT_PITCH;
          state.zoom = 1;
          frame();
        });

        function axisTick(ts) {
          if (!state.axisSlideAnim) {
            axisRaf = null;
            return;
          }
          if (axisLastTs <= 0) {
            axisLastTs = ts;
          } else {
            const dt = (ts - axisLastTs) * 0.001;
            axisLastTs = ts;
            state.axisPhase += dt * AXIS_SPEED * (state.axisSlideSpeedPct / 100);
          }
          frame();
          axisRaf = requestAnimationFrame(axisTick);
        }

        function setAxisSlideAnim(on) {
          state.axisSlideAnim = on;
          chkAxisSlideAnim.checked = on;
          syncChromePressedButtons();
          if (on) {
            axisLastTs = 0;
            if (axisRaf != null) cancelAnimationFrame(axisRaf);
            axisRaf = requestAnimationFrame(axisTick);
          } else {
            if (axisRaf != null) {
              cancelAnimationFrame(axisRaf);
              axisRaf = null;
            }
            frame();
          }
        }

        function readSlideControlsFromInputs() {
          state.slideAngleDeg = Number(slideAngleInput.value);
          state.axisSlideSpeedPct = Number(slideAnimSpeedInput.value);
          state.slideOffsetVDeg = Number(slideOffVInput.value);
          state.slideOffsetUDeg = Number(slideOffUInput.value);
          slideAngleVal.textContent = state.slideAngleDeg + "°";
          slideAnimSpeedVal.textContent = state.axisSlideSpeedPct + "%";
          slideOffVVal.textContent = state.slideOffsetVDeg + "°";
          slideOffUVal.textContent = state.slideOffsetUDeg + "°";
        }

        function onSlideControlInput() {
          readSlideControlsFromInputs();
          frame();
        }

        function readIrregularControlsFromInputs() {
          state.irregularSeed = Number(irregularSeedInput.value);
          state.irregularScale = Number(irregularScaleInput.value) / 100;
          irregularSeedVal.textContent = String(state.irregularSeed);
          irregularScaleVal.textContent = Math.round(Number(irregularScaleInput.value)) + "%";
        }

        function onIrregularControlInput() {
          readIrregularControlsFromInputs();
          frame();
        }

        slideAngleInput.addEventListener("input", onSlideControlInput);
        slideAnimSpeedInput.addEventListener("input", onSlideControlInput);
        slideOffVInput.addEventListener("input", onSlideControlInput);
        slideOffUInput.addEventListener("input", onSlideControlInput);
        readSlideControlsFromInputs();

        irregularSeedInput.addEventListener("input", onIrregularControlInput);
        irregularScaleInput.addEventListener("input", onIrregularControlInput);
        readIrregularControlsFromInputs();

        readPanelControlsFromInputs();
        readMeshOpacityFromInput();
        readMarkerCountFromInput();
        readMarkerSizeFromInput();
        readPathfinderControlsFromInputs();
        chkPathThrough.checked = state.pathThroughPoints;
        syncVolumeControlsFromState();
        chkPathsShow.checked = state.showPaths;
        chkStaticVolumePoints.checked = state.showStaticVolumePoints;
        chkAxisSlideAnim.checked = state.axisSlideAnim;
        chkMeshShow.checked = state.showMesh;
        chkMarkersShow.checked = state.showMarkers;
        syncPanelTogglesFromState();
        updateMeshControlsDisabled();
        updateMarkerControlsDisabled();
        syncChromePressedButtons();
        syncPopoverChrome();

        window.addEventListener("keydown", function (e) {
          if (e.key === "Escape") {
            closeAllPopovers();
          }
        });

        canvas.addEventListener("pointerdown", onPointerDown);
        canvas.addEventListener("pointermove", onPointerMove);
        canvas.addEventListener("pointerup", onPointerUp);
        canvas.addEventListener("pointercancel", onPointerUp);
        canvas.addEventListener("lostpointercapture", onPointerUp);
        canvas.addEventListener("wheel", onWheel, { passive: false });

        resize();
        requestAnimationFrame(resize);
        window.addEventListener("resize", resize);
        if (typeof ResizeObserver !== "undefined") {
          new ResizeObserver(resize).observe(viewport);
        }
      })();
    </script>
    <script src="embed-bridge.js"></script>
  </body>
</html>

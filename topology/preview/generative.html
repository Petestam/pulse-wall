<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Strand field · generative</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #000;
        overflow: hidden;
        font-family: system-ui, sans-serif;
      }
      #viz {
        display: block;
        width: 100%;
        height: 100%;
      }
      .chrome {
        position: fixed;
        left: 16px;
        bottom: 16px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        z-index: 2;
      }
      .chrome button {
        border: 1px solid rgba(0, 210, 255, 0.35);
        background: rgba(3, 8, 20, 0.75);
        color: rgba(230, 248, 255, 0.92);
        padding: 8px 14px;
        font-size: 12px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        cursor: pointer;
        border-radius: 2px;
      }
      .chrome button:hover {
        border-color: rgba(255, 170, 60, 0.55);
        color: #fff;
      }
      .chrome button.is-active {
        border-color: rgba(0, 210, 255, 0.75);
        box-shadow: 0 0 16px rgba(0, 185, 255, 0.35);
        color: #f4fbff;
      }
      .chrome a {
        color: rgba(0, 210, 255, 0.65);
        font-size: 12px;
        text-decoration: none;
        margin-left: 8px;
      }
      .chrome a:hover {
        color: rgba(255, 170, 60, 0.9);
      }
      .scenario-strip {
        position: fixed;
        left: 16px;
        right: 16px;
        bottom: 62px;
        z-index: 2;
        pointer-events: auto;
      }
      .scenario-strip__title {
        margin-bottom: 6px;
        color: rgba(160, 218, 255, 0.88);
        font-size: 10px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }
      .scenario-strip__buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .scenario-btn {
        border: 1px solid rgba(0, 210, 255, 0.25);
        background: rgba(3, 8, 20, 0.62);
        color: rgba(195, 232, 255, 0.85);
        padding: 5px 8px;
        font-size: 10px;
        letter-spacing: 0.04em;
        border-radius: 2px;
        cursor: pointer;
      }
      .scenario-btn.is-active {
        border-color: rgba(0, 210, 255, 0.72);
        box-shadow: 0 0 18px rgba(0, 185, 255, 0.35);
        color: #f3fbff;
      }
    </style>
  </head>
  <body>
    <canvas id="viz" aria-label="Generative strand visualization"></canvas>
    <div class="chrome">
      <button type="button" id="btn-spin" class="is-active">Spin</button>
      <button type="button" id="btn-labels">Labels</button>
      <button type="button" id="btn-sync">Sync pipe</button>
      <button type="button" id="btn-regen">Regenerate</button>
      <a href="index.html">Topology editor</a>
    </div>
    <div class="scenario-strip" id="scenario-strip">
      <div class="scenario-strip__title">12 scenarios</div>
      <div class="scenario-strip__buttons" id="scenario-buttons"></div>
    </div>
    <script src="generative.js"></script>
  </body>
</html>

      function hideContextMenu() {
        ctxMenu.hidden = true;
        ctxMenu.replaceChildren();
      }

      function edgeForPair(a, b) {
        const k = edgeKey(a, b);
        return EDGES.find((e) => edgeKey(e.from, e.to) === k) || null;
      }

      function ensurePlaybackOrb() {
        let orb = document.getElementById("sequence-orb");
        if (orb) return orb;
        orb = el("g", { id: "sequence-orb", hidden: "true" }, layerSequence);
        el(
          "ellipse",
          {
            id: "sequence-orb-tail",
            cx: -1.5,
            cy: 0,
            rx: 1.8,
            ry: 0.62,
            fill: "url(#orb-threat-tail-grad)",
            style: "mix-blend-mode: screen;",
          },
          orb,
        );
        el(
          "circle",
          {
            id: "sequence-orb-halo",
            cx: 0,
            cy: 0,
            r: 2.2,
            fill: "url(#orb-threat-halo-grad)",
            style: "mix-blend-mode: screen;",
          },
          orb,
        );
        return orb;
      }

      function ensureThreatTrace() {
        let trace = document.getElementById("sequence-threat-trace");
        if (trace) return trace;
        trace = el("g", { id: "sequence-threat-trace" }, layerSequence);
        el("path", { id: "sequence-threat-snake", class: "seq-threat-snake" }, trace);
        return trace;
      }

      function smoothstep01(t) {
        const x = Math.max(0, Math.min(1, t));
        return x * x * (3 - 2 * x);
      }

      // Continuous width profile: long tail -> bulge -> sharp leading edge.
      // Base edge is 0.05; max snake width is 4x = 0.2.
      function snakeWidthProfile(u) {
        const x = Math.max(0, Math.min(1, u));
        const tailRise = Math.pow(x, 0.68); // long, gradual tail
        const bulge = 0.82 + 0.45 * Math.exp(-Math.pow((x - 0.84) / 0.14, 2));
        const frontSharp =
          x < 0.945 ? 1 : Math.max(0, 1 - smoothstep01((x - 0.945) / 0.055));
        const baseEdgeWidth = 0.05;
        const maxSnakeWidth = baseEdgeWidth * sequenceSettings.snakeWidthMult;
        return maxSnakeWidth * tailRise * bulge * frontSharp;
      }

      function buildSnakeRibbonPath(pathEl, endDist, totalLen) {
        const snakeLen = Math.max(5.8, totalLen * sequenceSettings.snakeLengthFactor);
        const startDist = Math.max(0, endDist - snakeLen);
        const span = Math.max(0.001, endDist - startDist);
        const steps = 26;
        const left = [];
        const right = [];
        for (let i = 0; i < steps; i++) {
          const t = i / (steps - 1);
          const d = startDist + span * t;
          const p = pathEl.getPointAtLength(d);
          const p2 = pathEl.getPointAtLength(Math.min(totalLen, d + 0.34));
          const tx = p2.x - p.x;
          const ty = p2.y - p.y;
          const mag = Math.hypot(tx, ty) || 1;
          const nx = -ty / mag;
          const ny = tx / mag;
          const halfW = snakeWidthProfile(t) * 0.5;
          left.push({ x: p.x + nx * halfW, y: p.y + ny * halfW });
          right.push({ x: p.x - nx * halfW, y: p.y - ny * halfW });
        }
        if (!left.length) return "";
        let d = `M ${left[0].x} ${left[0].y}`;
        for (let i = 1; i < left.length; i++) d += ` L ${left[i].x} ${left[i].y}`;
        for (let i = right.length - 1; i >= 0; i--) d += ` L ${right[i].x} ${right[i].y}`;
        d += " Z";
        return d;
      }

      function applyOrbTuning() {
        const halo = document.getElementById("sequence-orb-halo");
        const tail = document.getElementById("sequence-orb-tail");
        if (!halo || !tail) return;
        const glowScale = sequenceSettings.glow * GLOW_GLOBAL_MULTIPLIER;
        const intensityScale = sequenceSettings.intensity * GLOW_GLOBAL_MULTIPLIER;
        halo.setAttribute("r", String(1.32 * glowScale));
        halo.setAttribute("opacity", String(Math.min(1.3, 0.82 * intensityScale)));
        tail.setAttribute("rx", String(1.35 + 1.25 * glowScale));
        tail.setAttribute("ry", String(0.46 + 0.24 * glowScale));
        tail.setAttribute("cx", String(-(0.7 + 0.8 * glowScale)));
        tail.setAttribute("opacity", String(Math.min(1.2, 0.62 + 0.28 * intensityScale)));
      }

      function updateTunerReadouts() {
        seqSpeedVal.textContent = `${sequenceSettings.speed.toFixed(0)} u/s`;
        seqEaseVal.textContent = `${sequenceSettings.ease.toFixed(2)}`;
        seqGlowVal.textContent = `${sequenceSettings.glow.toFixed(2)}x`;
        seqIntensityVal.textContent = `${sequenceSettings.intensity.toFixed(2)}x`;
        seqSnakeWidthVal.textContent = `${sequenceSettings.snakeWidthMult.toFixed(2)}x`;
        seqSnakeLengthVal.textContent = `${sequenceSettings.snakeLengthFactor.toFixed(2)}x`;
        seqParticleDensityVal.textContent = `${sequenceSettings.particleDensity.toFixed(2)}x`;
        seqParticleSizeVal.textContent = `${sequenceSettings.particleSize.toFixed(2)}x`;
        seqBroadcastPaceVal.textContent = `${sequenceSettings.broadcastPace.toFixed(2)}x`;
      }

      function stopSequencePlayback() {
        if (playback && playback.rafId) cancelAnimationFrame(playback.rafId);
        playback = null;
        const orb = document.getElementById("sequence-orb");
        if (orb) orb.setAttribute("hidden", "true");
        const snake = document.getElementById("sequence-threat-snake");
        if (snake) snake.setAttribute("d", "");
      }

      function playSequenceById(id) {
        const seq = sequences.find((s) => s.id === id);
        if (!seq) return;
        if (seq.nodes.length < 2) {
          showToast("Sequence needs 2+ nodes");
          return;
        }
        const segments = [];
        for (let i = 0; i < seq.nodes.length - 1; i++) {
          const fromId = seq.nodes[i];
          const toId = seq.nodes[i + 1];
          const fromNode = nodeIndex.get(fromId);
          const toNode = nodeIndex.get(toId);
          if (!fromNode || !toNode) {
            showToast("Sequence node missing");
            return;
          }
          const edge = edgeForPair(fromId, toId);
          if (!edge) {
            showToast(`Missing strand ${fromId} → ${toId}`);
            return;
          }
          const d = edgePath(fromNode, toNode, edge.crosses);
          const p = document.createElementNS(SVG_NS, "path");
          p.setAttribute("d", d);
          const len = p.getTotalLength();
          segments.push({ fromId, toId, path: p, len });
        }

        stopSequencePlayback();
        activeSequenceId = id;
        renderSequenceChips();
        ensureThreatTrace();

        const state = {
          seqId: id,
          segments,
          segmentIndex: 0,
          /** Wall-clock elapsed along current segment (seconds); mapped through easing → path length */
          segmentTimeElapsed: 0,
          holdUntilTs: null,
          holdAtNodeId: seq.nodes[0],
          lastTs: null,
          rafId: null,
        };
        playback = state;
        pulseNode(seq.nodes[0]);

        function tick(ts) {
          if (!playback || playback.seqId !== id) return;
          if (state.lastTs == null) state.lastTs = ts;
          const dt = (ts - state.lastTs) / 1000;
          state.lastTs = ts;

          // Hold orb on the node for a beat.
          if (state.holdAtNodeId) {
            if (state.holdUntilTs == null) {
              state.holdUntilTs = ts + NODE_BEAT_MS;
            }
            if (ts < state.holdUntilTs) {
              state.rafId = requestAnimationFrame(tick);
              return;
            }
            state.holdUntilTs = null;
            state.holdAtNodeId = null;
          }

          const seg = segments[state.segmentIndex];
          if (!seg) {
            setTimeout(() => stopSequencePlayback(), 140);
            return;
          }
          const durationSec = Math.max(0.02, seg.len / sequenceSettings.speed);
          state.segmentTimeElapsed += dt;
          const uLinear = Math.min(1, state.segmentTimeElapsed / durationSec);
          const uPath = blendPathEase(uLinear, sequenceSettings.ease);
          const clampedDist = seg.len * uPath;
          const threatSnake = document.getElementById("sequence-threat-snake");
          if (threatSnake) {
            threatSnake.setAttribute("d", buildSnakeRibbonPath(seg.path, clampedDist, seg.len));
          }

          if (uLinear >= 1 - 1e-6) {
            // Arrived at next node: settle for a beat.
            pulseNode(seg.toId);
            state.segmentIndex += 1;
            state.segmentTimeElapsed = 0;
            state.holdAtNodeId = seg.toId;
          }
          state.rafId = requestAnimationFrame(tick);
        }
        state.rafId = requestAnimationFrame(tick);
      }

      function renderSequenceChips() {
        seqChipRow.replaceChildren();
        sequences.forEach((seq) => {
          const b = document.createElement("button");
          b.type = "button";
          b.className = "seq-chip" + (seq.id === activeSequenceId ? " is-active" : "");
          b.textContent = `${seq.id} (${seq.nodes.length})`;
          b.addEventListener("click", () => playSequenceById(seq.id));
          b.addEventListener("contextmenu", (evt) => {
            evt.preventDefault();
            evt.stopPropagation();
            showContextMenu(evt.clientX, evt.clientY, [
              {
                label: "Delete sequence",
                onClick: () => {
                  const before = sequences.length;
                  sequences = sequences.filter((s) => s.id !== seq.id);
                  if (activeSequenceId === seq.id) {
                    activeSequenceId = null;
                    stopSequencePlayback();
                  }
                  renderSequenceChips();
                  persistState();
                  if (sequences.length < before) {
                    showToast(`Deleted ${seq.id}`);
                  }
                },
              },
              {
                label: "Cancel",
                onClick: () => {},
              },
            ]);
          });
          seqChipRow.appendChild(b);
        });
      }

      function showContextMenu(clientX, clientY, items) {
        ctxMenu.replaceChildren();
        items.forEach((item) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "ctx-menu__item";
          btn.textContent = item.label;
          btn.addEventListener("click", () => {
            hideContextMenu();
            item.onClick();
          });
          ctxMenu.appendChild(btn);
        });
        ctxMenu.hidden = false;
        ctxMenu.style.left = `${clientX}px`;
        ctxMenu.style.top = `${clientY}px`;
        const rect = ctxMenu.getBoundingClientRect();
        const left = Math.min(
          Math.max(6, clientX),
          window.innerWidth - rect.width - 6,
        );
        const top = Math.min(
          Math.max(6, clientY),
          window.innerHeight - rect.height - 6,
        );
        ctxMenu.style.left = `${left}px`;
        ctxMenu.style.top = `${top}px`;
      }

      function beginEditForNode(id, role) {
        const g = nodeEls.get(id);
        if (!g) return;
        const t = g.querySelector(`text[data-role="${role}"]`);
        if (!t) return;
        const n = nodeIndex.get(id);
        const rect = t.getBoundingClientRect();

        const input = document.createElement("input");
        input.type = "text";
        input.value = n[role] || "";
        input.className = "edit-input" + (role === "kind" ? " is-kind" : "");
        const minW = role === "kind" ? 140 : 200;
        const leftFor = () => {
          const anchor = t.getAttribute("text-anchor");
          const w = Math.max(minW, rect.width + 60);
          if (anchor === "end") return Math.max(8, rect.right - w);
          if (anchor === "middle")
            return Math.max(8, rect.left + rect.width / 2 - w / 2);
          return Math.max(8, rect.left - 6);
        };
        Object.assign(input.style, {
          left: `${leftFor()}px`,
          top: `${Math.max(8, rect.top - 6)}px`,
          width: `${Math.max(minW, rect.width + 60)}px`,
        });
        document.body.appendChild(input);
        t.style.opacity = "0";
        input.focus();
        input.select();

        let saved = true;
        const cleanup = () => {
          if (saved) {
            n[role] = input.value;
            setText(t, input.value);
            persistState();
          }
          t.style.opacity = "";
          input.remove();
        };
        input.addEventListener("blur", cleanup);
        input.addEventListener("keydown", (ke) => {
          if (ke.key === "Enter") {
            ke.preventDefault();
            input.blur();
          } else if (ke.key === "Escape") {
            ke.preventDefault();
            saved = false;
            input.blur();
          }
        });
      }

      function legacyCopyText(text) {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.setAttribute("readonly", "");
        ta.style.position = "fixed";
        ta.style.left = "-9999px";
        ta.style.top = "0";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        let ok = false;
        try {
          ok = document.execCommand("copy");
        } catch (_) {
          ok = false;
        }
        ta.remove();
        return ok;
      }

      document.getElementById("btn-copy").addEventListener("click", async () => {
        const payload = {
          scenario: {
            id: "React2Shell",
            title: "React2Shell · zones",
            viewBox: "120 50",
            exportedAt: new Date().toISOString(),
          },
          zones: ZONES.map((z) => ({ ...z })),
          dividers: DIVIDERS.map((d) => ({ ...d })),
          nodes: NODES.map(({ id, label, kind, zone, x, y, lp }) => ({
            id,
            label,
            kind,
            zone,
            x: Math.round(x * 10) / 10,
            y: Math.round(y * 10) / 10,
            lp,
          })),
          edges: EDGES.map(({ from, to, kind, crosses }) => ({
            from,
            to,
            kind,
            ...(crosses ? { crosses } : {}),
          })),
          sequences: sequences.map((s) => ({ id: s.id, nodes: [...s.nodes] })),
          sequenceDraft: [...seqDraft],
          sequenceCounter,
          activeSequenceId,
          settings: { ...sequenceSettings },
          uiState: {
            connectMode,
            seqRecordMode,
            activeSequenceId,
          },
          profile: {
            perf: PERF_PROFILE,
            maxConcurrentBroadcasts: MAX_CONCURRENT_BROADCASTS,
            baseBroadcastParticles: BROADCAST_BASE_PARTICLES,
          },
        };
        const text = JSON.stringify(payload, null, 2);
        try {
          if (navigator.clipboard && window.isSecureContext) {
            await navigator.clipboard.writeText(text);
            showToast("Copied · scenario JSON");
            return;
          }
          if (legacyCopyText(text)) {
            showToast("Copied · fallback mode");
            return;
          }
          console.log(text);
          showToast("Copy blocked · JSON in console");
        } catch (_) {
          if (legacyCopyText(text)) {
            showToast("Copied · fallback mode");
            return;
          }
          console.log(text);
          showToast("Copy blocked · JSON in console");
        }
      });

      const btnConnect = document.getElementById("btn-connect");
      const btnClearEdges = document.getElementById("btn-clear-edges");
      function updateModeButtons() {
        btnConnect.textContent = `Connect: ${connectMode ? "On" : "Off"}`;
        btnConnect.classList.toggle("is-active", connectMode);
        btnSeqRecord.textContent = `Seq record: ${seqRecordMode ? "On" : "Off"}`;
        btnSeqRecord.classList.toggle("is-active", seqRecordMode);
        if (!deleteNodeMode) {
          nodeEls.forEach((g) => g.classList.remove("is-delete-target"));
        }
        refreshSequenceDraftVisuals();
      }
      btnConnect.addEventListener("click", () => {
        connectMode = !connectMode;
        if (connectMode) {
          addNodeMode = false;
          deleteNodeMode = false;
        } else {
          clearSelection();
        }
        updateModeButtons();
      });
      btnClearEdges.addEventListener("click", () => {
        EDGES = [];
        stopSequencePlayback();
        activeSequenceId = null;
        clearSelection();
        renderEdges();
        renderSequenceChips();
        persistState();
        showToast("All strands cleared");
      });

      btnSeqRecord.addEventListener("click", () => {
        seqRecordMode = !seqRecordMode;
        if (seqRecordMode) {
          connectMode = false;
          clearSelection();
          showToast("Sequence record on");
        }
        updateModeButtons();
      });

      btnSeqSave.addEventListener("click", () => {
        if (seqDraft.length < 2) {
          showToast("Need 2+ nodes in draft");
          return;
        }
        sequenceCounter += 1;
        const id = `seq-${sequenceCounter}`;
        sequences.push({ id, nodes: [...seqDraft] });
        seqDraft = [];
        seqRecordMode = false;
        renderSequenceChips();
        updateModeButtons();
        persistState();
        showToast(`Saved ${id}`);
      });

      btnSeqTuner.addEventListener("click", () => {
        seqTuner.hidden = !seqTuner.hidden;
      });

      seqSpeed.addEventListener("input", () => {
        sequenceSettings.speed = Number(seqSpeed.value);
        updateTunerReadouts();
        persistState();
      });
      seqEase.addEventListener("input", () => {
        sequenceSettings.ease = Number(seqEase.value);
        updateTunerReadouts();
        persistState();
      });
      seqGlow.addEventListener("input", () => {
        sequenceSettings.glow = Number(seqGlow.value);
        updateTunerReadouts();
        applyOrbTuning();
        persistState();
      });
      seqIntensity.addEventListener("input", () => {
        sequenceSettings.intensity = Number(seqIntensity.value);
        updateTunerReadouts();
        applyOrbTuning();
        persistState();
      });
      seqSnakeWidth.addEventListener("input", () => {
        sequenceSettings.snakeWidthMult = Number(seqSnakeWidth.value);
        updateTunerReadouts();
        persistState();
      });
      seqSnakeLength.addEventListener("input", () => {
        sequenceSettings.snakeLengthFactor = Number(seqSnakeLength.value);
        updateTunerReadouts();
        persistState();
      });
      seqParticleDensity.addEventListener("input", () => {
        sequenceSettings.particleDensity = Number(seqParticleDensity.value);
        updateTunerReadouts();
        persistState();
      });
      seqParticleSize.addEventListener("input", () => {
        sequenceSettings.particleSize = Number(seqParticleSize.value);
        updateTunerReadouts();
        persistState();
      });
      seqBroadcastPace.addEventListener("input", () => {
        sequenceSettings.broadcastPace = Number(seqBroadcastPace.value);
        updateTunerReadouts();
        persistState();
      });

      document.getElementById("btn-save-default").addEventListener("click", () => {
        if (saveCurrentAsDefault()) showToast("Saved as default");
        else showToast("Could not save default");
      });

      document.getElementById("btn-reset").addEventListener("click", () => {
        stopSequencePlayback();
        activeSequenceId = null;
        seqDraft = [];
        seqRecordMode = false;
        clearSelection();

        if (tryLoadSnapshotKey(BASELINE_KEY)) {
          seqSpeed.value = String(sequenceSettings.speed);
          seqEase.value = String(sequenceSettings.ease);
          seqGlow.value = String(sequenceSettings.glow);
          seqIntensity.value = String(sequenceSettings.intensity);
          seqSnakeWidth.value = String(sequenceSettings.snakeWidthMult);
          seqSnakeLength.value = String(sequenceSettings.snakeLengthFactor);
          seqParticleDensity.value = String(sequenceSettings.particleDensity);
          seqParticleSize.value = String(sequenceSettings.particleSize);
          seqBroadcastPace.value = String(sequenceSettings.broadcastPace);
          renderEdges();
          renderNodes();
          renderSequenceChips();
          updateTunerReadouts();
          applyOrbTuning();
          updateModeButtons();
          persistState();
          showToast("Reset to saved default");
          return;
        }

        NODES = INITIAL_NODES.map((n) => ({ ...n }));
        EDGES = INITIAL_EDGES.map((e) => ({ ...e }));
        nodeIndex = new Map(NODES.map((n) => [n.id, n]));
        nodeCounter = NODES.length;
        sequences = [];
        sequenceCounter = 0;
        Object.assign(sequenceSettings, DEFAULT_SEQUENCE_SETTINGS);
        seqSpeed.value = String(sequenceSettings.speed);
        seqEase.value = String(sequenceSettings.ease);
        seqGlow.value = String(sequenceSettings.glow);
        seqIntensity.value = String(sequenceSettings.intensity);
        seqSnakeWidth.value = String(sequenceSettings.snakeWidthMult);
        seqSnakeLength.value = String(sequenceSettings.snakeLengthFactor);
        seqParticleDensity.value = String(sequenceSettings.particleDensity);
        seqParticleSize.value = String(sequenceSettings.particleSize);
        seqBroadcastPace.value = String(sequenceSettings.broadcastPace);
        renderEdges();
        renderNodes();
        renderSequenceChips();
        updateTunerReadouts();
        applyOrbTuning();
        updateModeButtons();
        persistState();
        showToast("Reset");
      });

      svg.addEventListener("click", (evt) => {
        hideContextMenu();
        if (!addNodeMode) return;
        const target = evt.target;
        if (
          target.closest(".node") ||
          (target.tagName && target.tagName.toLowerCase() === "path")
        ) {
          return;
        }
        const p = svgPoint(evt);
        addNodeAt(p.x, p.y);
      });

      svg.addEventListener("contextmenu", (evt) => {
        evt.preventDefault();
        evt.stopPropagation();
        const nodeGroup =
          evt.target && evt.target.closest ? evt.target.closest(".node") : null;
        if (nodeGroup) {
          const id = nodeGroup.getAttribute("data-id");
          showContextMenu(evt.clientX, evt.clientY, [
            {
              label: "Rename label",
              onClick: () => beginEditForNode(id, "label"),
            },
            {
              label: "Rename kind",
              onClick: () => beginEditForNode(id, "kind"),
            },
            {
              label: "Delete node",
              onClick: () => deleteNode(id),
            },
          ]);
          return;
        }
        const p = svgPoint(evt);
        showContextMenu(evt.clientX, evt.clientY, [
          {
            label: "Add node here",
            onClick: () => addNodeAt(p.x, p.y),
          },
          {
            label: "Cancel",
            onClick: () => {},
          },
        ]);
      });

      document.addEventListener("click", (evt) => {
        if (!ctxMenu.hidden && !ctxMenu.contains(evt.target)) {
          hideContextMenu();
        }
      });
      window.addEventListener("resize", hideContextMenu);
      window.addEventListener("scroll", hideContextMenu, true);

      // ─── Initial render ────────────────────────────────────────────
      loadPersistedState();
      seqSpeed.value = String(sequenceSettings.speed);
      seqEase.value = String(sequenceSettings.ease);
      seqGlow.value = String(sequenceSettings.glow);
      seqIntensity.value = String(sequenceSettings.intensity);
      seqSnakeWidth.value = String(sequenceSettings.snakeWidthMult);
      seqSnakeLength.value = String(sequenceSettings.snakeLengthFactor);
      seqParticleDensity.value = String(sequenceSettings.particleDensity);
      seqParticleSize.value = String(sequenceSettings.particleSize);
      seqBroadcastPace.value = String(sequenceSettings.broadcastPace);
      renderZones();
      renderDividers();
      renderEdges();
      renderNodes();
      renderSequenceChips();
      updateTunerReadouts();
      updateModeButtons();
    </script>
    <script src="canvas-nav.js"></script>
  </body>
</html>
